he buyer's contact record in your CRM: paste it into a note, or better, into a custom field so it is always in the same place. In GHL: open the contact, scroll to the custom fields, paste. In any CRM without custom fields: pin a note titled \"PREFERENCE PROFILE\" and overwrite it each time.\n8. Copy the action items into your task app or CRM tasks.\n9. Next showing day, repeat from step 4. Paste the buyer's existing preference profile above the new transcript (\"Current profile below, update it with today's showings\") so the profile compounds instead of resetting.\n\nTotal per showing day once you have the rhythm: about 5 minutes.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nGoal: new transcript appears, and 60 seconds later a draft email is sitting in Gmail and the GHL contact is updated. No copy-paste. Assumes a working n8n instance (a $5-10/mo Hostinger VPS running the n8n Docker image) and a GHL sub-account. Zapier/Make equivalents are noted per step.\n\n**Step 1: Create the GHL custom fields.**\nIn GHL: **Settings > Custom Fields > Add Field**. Create these, all under the Contact object:\n- `Buyer Preference Profile` (Multi-line text)\n- `Last Showing Date` (Date)\n- `Price Comfort` (Single-line text)\n- `Must Haves` (Multi-line text)\n- `Dealbreakers` (Multi-line text)\n- `Next Step` (Single-line text)\n\nNote each field's ID: **Settings > Custom Fields**, click the field, the ID is in the URL (or pull them via API: `GET /locations/{locationId}/customFields`). You need these IDs in Step 5.\n\n**Step 2: Get transcripts flowing to a trigger point.**\nPick one:\n- **Otter route (easiest):** Otter has native Zapier support (trigger: new transcript ready). In n8n, use Zapier as a bridge or skip Otter's API and use the email route below. In Zapier/Make this is one step: \"Otter.ai: New Transcript.\"\n- **Plaud/any-recorder email route (most portable):** In the Plaud app, share each finished transcript via email to a dedicated address like `debrief.yourname@gmail.com` (Plaud's share sheet does email; it becomes a two-tap habit). Voice Memos transcripts can be shared the same way. This route works identically for every recorder, which is why it is the default here.\n\n**Step 3: n8n trigger.**\nIn n8n: **New Workflow > Add first step > Gmail Trigger** (or IMAP Email node for non-Gmail). Connect the debrief Gmail account with OAuth. Set **Event: Message Received**, filter **Label/Search: `to:debrief.yourname@gmail.com`**, poll every minute. The email body (or attached .txt) is your transcript.\n*Zapier equivalent: \"Gmail: New Email matching search\" trigger. Make: \"Gmail: Watch emails.\"*\n\n**Step 4: Identify the buyer.**\nAdd a **Code** node that extracts the buyer's name from the email subject. Convention: you type the buyer's name as the share subject when sending from the Plaud app (subject: `Sarah Chen`). Then add an **HTTP Request** node to look up the contact in GHL:\n- Method: `GET`\n- URL: `https://services.leadconnectorhq.com/contacts/?locationId={{locationId}}&query={{ $json.buyerName }}`\n- Auth: Header `Authorization: Bearer {PIT token}` (create the token in GHL: **Settings > Private Integrations > New**, scopes: contacts read/write), plus header `Version: 2021-07-28`.\nTake the first result's `contact.id` and `contact.email`. Add an **IF** node: if no contact found, send yourself a Slack/SMS alert and stop (never let the AI guess who the buyer is).\n*Zapier: \"GHL: Find Contact.\" Make: \"GoHighLevel: Search Contacts.\"*\n\n**Step 5: AI processing.**\nAdd n8n's **Anthropic (Claude) node** (or an HTTP Request to `https://api.anthropic.com/v1/messages`). Model: current Sonnet-class model. System prompt: paste the **Debrief Prompt** from Section 7, with the JSON output instruction included. User message, assembled from prior nodes:\n\n```\nBuyer: {{name}}\nCurrent preference profile (may be empty):\n{{ $json.customFields['Buyer Preference Profile'] }}\n\nToday's transcript:\n{{ transcript }}\n```\n\nFeeding the existing profile back in is the compounding step; do not skip it. Add a **Code** node after to `JSON.parse()` the response and fail loudly if parsing breaks.\n*Zapier: \"Anthropic: Send Message\" (or ChatGPT action). Make: \"Anthropic Claude: Create a Message.\"*\n\n**Step 6: Write back to GHL.**\nAdd an **HTTP Request** node:\n- Method: `PUT`\n- URL: `https://services.leadconnectorhq.com/contacts/{{ contactId }}`\n- Body (JSON): `customFields` array mapping each field ID from Step 1 to the parsed AI output (`preference_profile`, `price_comfort`, `must_haves`, `dealbreakers`, `next_step`, plus today's date).\nThen a second HTTP Request: `POST https://services.leadconnectorhq.com/contacts/{{ contactId }}/notes` with the full showing summary as the note body, so the raw history is preserved even as the profile field gets overwritten.\n*Zapier/Make: \"GHL: Update Contact\" + \"GHL: Add Note.\"*\n\n**Step 7: Create the draft email.**\nAdd a **Gmail node > Create Draft**: To: the buyer's email from Step 4, Subject: `{{ email_subject }}` from the AI output, Body: `{{ recap_email }}`. The draft sits in your Drafts folder for one-click review-and-send from your phone.\nGHL-native alternative: instead of Gmail, `POST` a task to the contact (\"Review + send recap\") and drop the email body into the task description, then send from GHL's conversation view.\n*Zapier: \"Gmail: Create Draft.\" Make: \"Gmail: Create a Draft.\"*\n\n**Step 8: Action items.**\nAdd one more HTTP Request per action item: `POST https://services.leadconnectorhq.com/contacts/{{ contactId }}/tasks` with title, due date (default: tomorrow), and assignedTo you. Or push them to your task app of choice via its n8n node.\n\n**Step 9: Test end to end.**\nSend a fake transcript email using a test contact (never a real client for testing). Confirm: draft appears in Gmail, custom fields update in GHL, note logged, tasks created. Then check the n8n execution log for the run and turn the workflow **Active**.\n\n**Step 10: Guardrail.**\nThe workflow must never auto-send the recap. Draft only. The agent's eyes are the compliance layer; keep them in the loop permanently.\n\n## 7. Prompts & Templates\n\n### The Debrief Prompt (paste as Project instructions in Starter, or as the system prompt in the Full Build)\n\n```\nYou are a real estate showing-debrief assistant for a buyer's agent.\nYou will receive a voice transcript recorded after home showings. It\nwill be rambling, out of order, and conversational. Extract what\nmatters and produce exactly three outputs.\n\nOUTPUT 1: RECAP EMAIL (to the buyer)\n- Warm, professional, first person from the agent. Grade-8 reading level.\n- Subject line included.\n- One short intro line, then one section per property, in the order\n  toured. For each property: address as a bold heading, then\n  \"What you liked\", \"What gave you pause\", and my read in one line.\n- Close with \"Recommended next steps\" as a short numbered list, and a\n  one-line invitation to reply.\n- Under 300 words total. No hype language, no pressure.\n- Never state a fair-housing-sensitive characteristic of a neighborhood\n  (demographics, schools framed as \"good/bad\", crime, religion, family\n  status). If the transcript mentions one, omit it from the email.\n\nOUTPUT 2: BUYER PREFERENCE PROFILE\nA structured profile that REPLACES the previous version. If I provide\na current profile, merge it: keep what still holds, update what changed\ntoday, note reversals explicitly (\"previously wanted X, now prefers Y\").\nFields:\n- Price comfort (what they actually react to, not just stated budget)\n- Must-haves (confirmed by in-person reactions)\n- Nice-to-haves\n- Dealbreakers (confirmed by in-person reactions)\n- Style and layout preferences\n- Location and commute notes (facts only, no protected-class content)\n- Decision dynamics (who leans which way, timeline pressure, financing notes)\n- Next step\n\nOUTPUT 3: AGENT ACTION ITEMS\nEvery commitment I made and every open question, as a checklist with a\nsuggested owner and deadline. Include follow-ups I did not promise but\nclearly should do.\n\nRules:\n- Use only what is in the transcript and the provided profile. Never\n  invent details, addresses, or reactions. If a property's address is\n  unclear, flag it as [CONFIRM ADDRESS] instead of guessing.\n- If the transcript contains anything about other clients, unrelated\n  business, or private matters, exclude it from all outputs.\n- Plain text. No em dashes.\n```\n\n### Full Build add-on: JSON output instruction (append to the prompt above for Step 5)\n\n```\nReturn ONLY valid JSON, no markdown fences, in exactly this shape:\n{\n  \"email_subject\": \"...\",\n  \"recap_email\": \"...\",\n  \"preference_profile\": \"...\",\n  \"price_comfort\": \"...\",\n  \"must_haves\": \"...\",\n  \"dealbreakers\": \"...\",\n  \"next_step\": \"...\",\n  \"action_items\": [\n    {\"task\": \"...\", \"due\": \"YYYY-MM-DD\"}\n  ]\n}\n```\n\n### In-car consent script (say it on the recording)\n\n```\n\"Before we talk through the houses, I record these debriefs so I can\nsend you an accurate recap and keep your preferences straight. The\nrecording is just for my notes. Are you both okay with that?\"\n[Wait for a clear yes from everyone in the car.]\n```\n\n### Solo debrief structure (what to say when recording alone)\n\n```\nBuyer name. Date. Then for each property: address, their reaction on\narrival, what they liked, what they disliked, concerns or objections,\nmy read on their interest level 1-10, anything I promised. Finish with:\noverall where their head is, what changed about their criteria today,\nand my next steps.\n```\n\n## 8. What It Costs\n\n### Starter\n\n| Item | Startup | Monthly |\n|---|---|---|\n| iPhone Voice Memos or Otter free (300 min/mo) | $0 | $0 |\n| Claude free tier or Claude Pro | $0 | $0-20 |\n| Existing CRM | $0 | $0 |\n| **Total** | **$0** | **$0-20** |\n\n### Full Build\n\n| Item | Startup | Monthly |\n|---|---|---|\n| Plaud NotePin (optional but worth it) | $159 | $0 |\n| Plaud AI Pro plan (or Otter Pro $16.99/mo) | $0 | approx. $8.33 (billed $99.99/yr) |\n| GoHighLevel Starter | $0 | $97 |\n| n8n self-hosted on Hostinger VPS | $0 | $5-10 |\n| Claude API usage | $5 initial credit | $1-3 |\n| Gmail | $0 | $0 |\n| **Total** | **approx. $164** | **approx. $110-160** |\n\nAPI assumption: 40 debriefs/month, each roughly 3,000 input tokens (transcript + profile + prompt) and 1,500 output tokens on a Sonnet-class model, about $0.03 per debrief, so under $2/month. Even doubling volume keeps it under $5. If the agent already pays for GHL through their team or brokerage, the true incremental cost of the Full Build is about $15-25/month.\n\n## 9. Compliance & Gotchas\n\n- **Recording consent law is the big one.** Texas is a one-party consent state: you may record a conversation you are part of without telling the buyer. But 11+ states require all-party consent (California, Florida, Washington, Illinois, Maryland, Massachusetts, Montana, New Hampshire, Oregon, Pennsylvania, and others), and the stricter state's law can apply if anyone on the call or in the car is connected to one. The professional standard regardless of state: use the consent script, on the recording, every time. It takes ten seconds and it also builds trust.\n- **Never record inside a seller's home without thinking.** Many listings have active cameras and some MLSs and state laws address surveillance disclosures. Record your debrief in the car or outside, not while walking someone else's property, and never capture the sellers' or other agents' conversations.\n- **Fair housing.** Buyers say fair-housing-problematic things out loud (\"what kind of people live here\", school and crime commentary). The prompt strips this from the email, but the transcript still exists and the CRM profile is discoverable. Review the profile field before saving; keep it to property criteria and facts. Train yourself to redirect those comments in person, too.\n- **Human review is mandatory on the email.** AI misattributes reactions between properties more than any other failure mode. The draft-only design exists for a reason; never wire an auto-send.\n- **TREC/NAR advertising rules do not directly govern a 1:1 client email, but** if you repurpose recap content publicly (social posts, testimonials), Texas agents need the usual TREC ad requirements (license status, broker identification) and accuracy standards.\n- **A2P 10DLC:** this build is email-first, so no SMS registration is required. If you later add \"text me when the recap is ready\" or send recaps by SMS from GHL, the sending number must be A2P 10DLC registered with an approved campaign, or carriers will filter you.\n- **Data privacy.** Transcripts contain financial details (budget, financing, motivation). Plaud and Otter both process audio in their clouds; check your brokerage's vendor policy. Delete raw audio on a schedule, restrict the debrief inbox to you, and never paste one buyer's transcript into another buyer's chat thread.\n- **MLS rules barely touch this build** since you are describing homes you physically toured to your own client, but do not paste MLS remarks or photos into recap emails for listings your buyer has not been shown through proper channels, and respect your MLS's rules on redistributing listing content.\n- **Confidentiality trap:** if the buyer debrief happens while your seller-side phone rings, stop recording. Cross-client contamination in one transcript is the fastest way to leak confidential information into the wrong CRM record. The prompt excludes it, but the recording still exists.\n"}, {"id": "b07", "file": "07-instant-cma-net-sheet.md", "nav": "Instant CMA + Net Sheet", "group": "builds", "num": "07", "diff": "Medium", "lvl": 2, "starter": "$0-20", "full": "$120-160", "line": "Type an address, get a branded pre-listing package: comps, a reasoned price range, and a Texas seller net sheet.", "md": "# Instant CMA + Seller Net Sheet\n\nType an address, get back a branded pre-listing package: comps, a priced range with reasoning, and a seller net sheet, in minutes instead of hours.\n\n## 1. What It Is\n\nThis build turns the slowest part of listing prep into a fill-in-the-blank exercise. You give it an address and a handful of recent nearby sales, and it hands you back three things on your branding: a comparable sales analysis (which homes sold, for how much, and how they stack up against the subject property), a suggested price range with the reasoning written out in plain English, and a seller net sheet showing roughly what the seller walks away with at a chosen price after commission, title policy, escrow fees, prorated taxes, and payoff. In the starter version you paste comps into an AI chat and drop the result into a template. In the full version, you or a lead types an address into a form and the finished package shows up as a polished PDF, and a public \"what's my home worth\" page captures seller leads and books listing appointments for you.\n\n## 2. Why You Need It\n\nA decent CMA takes most agents 1 to 3 hours: pull comps, build the spreadsheet, write the narrative, format the presentation, then build a net sheet by hand or bug your title rep for one. This build gets you 90 percent of the way there in under 15 minutes. If you take two listing appointments a month, that is 4 to 6 hours back monthly, and it means you can walk into every appointment with a printed, branded package instead of winging it from an MLS printout.\n\nThe bigger win is speed-to-lead on the seller side. NAR profile data has said for years that most sellers interview only one agent. The agent who responds to \"what do you think my house is worth?\" with a full branded package in 20 minutes usually becomes that one agent. The lead-capture variant in the full build also replaces $100 to 300 per month home-valuation widgets, and unlike a Zestimate-style instant number, yours comes with your face, your reasoning, and a booking link.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| Claude Pro (or ChatGPT Plus) | Analyzes comps, writes the CMA narrative, calculates the net sheet | $20/mo | Free tiers work for the starter version at low volume; already have ChatGPT Plus? It works |\n| Your MLS | Source of comparable sales | Included in your dues | RPR (free with NAR membership), Cloud CMA export (approx. $35/mo direct, often free through your MLS) |\n| A document template | Branded wrapper for the output | Free (Canva or Google Docs) | Already have listing presentation templates? Reuse them |\n| GoHighLevel (full build) | Lead-capture form, contact record, PDF delivery, booking | $97/mo Starter, $297/mo Unlimited (API access) | Follow Up Boss, BoldTrail/kvCORE (often brokerage-provided), Lofty, or your brokerage's free CRM plus a form tool |\n| n8n (full build) | Automation engine: receives the address, calls the AI, builds the PDF | Self-host approx. $5-10/mo VPS; n8n Cloud from approx. $24/mo | Make (Core $9/mo, approx. 10k operations) or Zapier (Pro from approx. $19.99/mo annual) |\n| Claude API (full build) | Pay-per-use AI for the automated pipeline (a chat subscription cannot be called by n8n) | Approx. $1-5/mo at typical volume, see Section 8 | OpenAI API works the same way |\n| Supabase (optional, full build) | Holds a RESO MLS feed for automatic comp lookup | Free tier; Pro $25/mo | Airtable or Google Sheets holding your exported comps; most agents skip this entirely |\n| PDF rendering (full build) | Turns AI-generated HTML into a branded PDF | PDF.co, api2pdf, or a free html-to-pdf step in n8n | Gotenberg self-hosted on the same VPS is free |\n\nCheapest possible path: your existing MLS login, a free Claude or ChatGPT account, and a free Canva template. Total new spend: $0. The $20/mo AI subscription is the first upgrade worth making because you get longer documents, file uploads, and Projects to store your prompt.\n\n## 4. How It Works\n\n1. Comps go in: either you paste 4 to 6 recent sales from an MLS printout or CSV export, or (full build) the system pulls them automatically from a Supabase MLS feed or an uploaded Cloud CMA/RPR export.\n2. The AI adjusts and reasons: it compares the subject property to each comp on beds, baths, square footage, lot, condition, and sale date, and produces a supported price range, not a single fake-precise number.\n3. The AI runs the math: at your chosen list price it calculates a Texas seller net sheet line by line: owner's title policy, escrow fee, tax proration, commission, payoff, and the rest.\n4. Output lands somewhere useful: starter, a formatted one-pager you paste into your template; full build, a branded HTML page rendered to PDF and attached to the contact record in your CRM.\n5. (Full build only) A public \"home worth\" page captures the lead first: visitor enters an address and contact info, gets a teaser range by email, and is pushed to your booking calendar for the full package.\n\nWhy this architecture: the AI never invents comps, it only analyzes data you (or your data source) feed it. That keeps the numbers defensible, keeps you inside MLS rules, and keeps the human in the loop where licensing law needs one.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\n1. In your MLS, run a comparable search for a subject property: same subdivision or a half-mile radius, sold in the last 6 months, similar square footage (plus or minus 15 percent). Select the best 4 to 6 and export to CSV, or just print/save the one-line summary as a PDF.\n2. Open Claude (claude.ai) or ChatGPT. If you have a paid plan, create a Project (Claude) or a custom GPT/saved prompt (ChatGPT) called \"Instant CMA\" so you never re-paste the instructions.\n3. Paste the CMA MASTER PROMPT from Section 7 into the Project's instructions (or the chat itself on a free plan).\n4. Attach or paste your comps. Then type the subject property details: address, beds, baths, square footage, year built, lot size, condition notes, and anything unusual (pool, foundation repair, backs to a road).\n5. Read the output critically. You are the licensee: check that the adjustments make sense for your market and that the suggested range matches your gut. Edit anything you disagree with. Never skip this step.\n6. Reply with: \"Now run the net sheet at $X\" using your chosen list price, plus the seller's approximate loan payoff and annual tax amount. The prompt already contains the Texas cost logic.\n7. Open your template. Free path: in Canva, search \"real estate CMA\" templates, pick one, drop in your logo, headshot, and brand colors, and save it as a reusable template. Paste the AI's comp table, narrative, and net sheet into the matching text boxes.\n8. Export as PDF. Text it or email it to the seller, or print it for the appointment. Total time after the first setup: 10 to 15 minutes per property.\n9. Save the finished chat. Next property, you only do steps 1, 4, 5, 6, and 7.\n\nQuality checklist before anything leaves your hands:\n\n- Every comp is one you actually pulled, at the price the MLS shows. Spot-check two.\n- The range feels right for your market. If it does not, the comps were wrong, fix the inputs.\n- The disclaimer paragraph survived your copy-paste into the template.\n- Commission and payoff figures match the actual listing agreement and the seller's mortgage statement, not a guess.\n- Your name, license number, and brokerage appear on the document.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nPrerequisites: GHL sub-account (Unlimited plan if you need API access on your own account), n8n running on a VPS, a Claude API key from console.anthropic.com, and a PDF step (Gotenberg container on the same VPS, or a PDF.co account).\n\n1. Build the intake form in GHL. Sites > Forms > Builder > Add Form, name it \"CMA Request\". Fields: Full Name, Email, Phone, plus custom fields you create under Settings > Custom Fields: `property_address` (text), `beds` (number), `baths` (number), `sqft` (number), `year_built` (number), `condition_notes` (large text), `target_price` (monetary, optional), `loan_payoff` (monetary, optional), `annual_taxes` (monetary, optional). Two use cases, same form: you fill it yourself from your phone for a real CMA, or a stripped-down public version (address + contact only) becomes the \"what's my home worth\" lead page.\n2. Create the n8n workflow. In n8n, add a Webhook node, method POST, path `cma-request`. Copy the Production URL (looks like `https://your-n8n-domain/webhook/cma-request`).\n3. Wire GHL to n8n. In GHL: Automation > Create Workflow > trigger \"Form Submitted\", select \"CMA Request\". Add action \"Webhook\", method POST, paste the n8n Production URL. In Custom Data, map every field: `address` = `{{contact.property_address}}`, `name` = `{{contact.first_name}} {{contact.last_name}}`, `email` = `{{contact.email}}`, and so on for beds, baths, sqft, year_built, condition_notes, target_price, loan_payoff, annual_taxes, plus `contact_id` = `{{contact.id}}`. Save and publish. (Zapier/Make: trigger \"New Form Submission in HighLevel\" replaces this GHL workflow entirely.)\n4. Add the comps step in n8n. Pick one path:\n   - With a RESO feed in Supabase: add a Postgres or Supabase node after the webhook. Query: closed sales within 0.5 miles (or same subdivision), last 180 days, sqft between 0.85x and 1.15x of the subject, `StandardStatus = 'Closed'`, order by close date, limit 6. Note the RESO enum is exactly `Closed`, PascalCase.\n   - Without a feed (most agents): the workflow pauses instead. Add a Gmail/SMTP node that emails the operator \"CMA requested for {address}, reply with comps CSV\", and a second Webhook or n8n Form node that accepts the pasted CSV and resumes. Or skip automation of this step: attach the Cloud CMA or RPR export manually and use an n8n Form trigger instead of the GHL webhook. (Zapier: \"Delay until\" + email step. Make: \"Sleep\" + mailhook.)\n5. Add the AI node. HTTP Request node, POST to `https://api.anthropic.com/v1/messages`, headers `x-api-key: YOUR_KEY`, `anthropic-version: 2023-06-01`, `content-type: application/json`. Body: model `claude-sonnet-5`, max_tokens 8000, system prompt = the CMA MASTER PROMPT from Section 7 plus the HTML OUTPUT ADDENDUM, user message = a JSON blob of subject property fields and the comps rows from step 4. (Zapier: \"Anthropic (Claude) > Send Message\" action. Make: Anthropic module, same fields.)\n6. Render the PDF. If Gotenberg is on your VPS: HTTP Request node, POST the returned HTML as a file to `http://gotenberg:3000/forms/chromium/convert/html`. If PDF.co: use their `/pdf/convert/from/html` endpoint with your API key. Either way the node outputs binary PDF data.\n7. Store and deliver. Upload the PDF somewhere with a public or signed URL (Supabase Storage node, S3, or Google Drive node with a shareable link). Then a final HTTP Request node posts back to GHL: either trigger a second GHL workflow via an Inbound Webhook trigger (Automation > Create Workflow > trigger \"Inbound Webhook\", copy its URL into n8n) that sends the branded email with the PDF link and updates the contact, or hit the GHL API directly to add a note + tag `cma-delivered` on `contact_id`.\n8. Operator review gate. For real CMAs (not teaser leads), do not auto-send. Have step 7 deliver the PDF to YOU (email or Slack), you review the comps and range, then you forward it or click an approval link (n8n \"Wait for approval\" on the send path). This is the human-review step your license requires. Teaser ranges for the lead page can go out automatically because they are broad and clearly labeled.\n9. Build the lead-capture variant. Duplicate the GHL form as \"Home Worth\", keep only address + name + email + phone, embed it on a GHL funnel page (Sites > Funnels > New Funnel, one-step page: headline \"What is your home worth in today's market?\", the form, your headshot). Point it at the same n8n webhook with a flag `mode: teaser`. In n8n, an IF node on `mode`: teaser path uses the TEASER PROMPT from Section 7, output goes into a GHL email template ending with your calendar link (Calendars > create \"Listing Consultation\" if you have not), and the contact gets tag `seller-lead`. Follow-up nurture is a standard GHL workflow off that tag.\n10. Test end to end with your own address and a test contact before anything goes live. Check the math on the net sheet against a real title company net sheet at least once. Ask your title rep for their current escrow fee and a promulgated-rate card; Texas owner's title policy rates are set by TDI, so hardcode the current rate table into the prompt or a Code node and update it when TDI changes rates.\n\n## 7. Prompts & Templates\n\n### CMA MASTER PROMPT (system prompt / Project instructions)\n\n```\nYou are a comparative market analysis assistant for a licensed Texas real estate\nagent. You analyze ONLY the comparable sales data provided to you. You never\ninvent, estimate, or recall sales data from memory. If the provided comps are\ninsufficient (fewer than 3, stale beyond 6 months, or wildly dissimilar), say so\nand list what better comps would look like instead of forcing an answer.\n\nWHEN GIVEN A SUBJECT PROPERTY AND COMPS, PRODUCE:\n\n1. COMP TABLE. One row per comp: address, sale date, sale price, beds/baths,\n   sqft, price per sqft, days on market, and a one-line \"versus subject\" note.\n\n2. ADJUSTMENT ANALYSIS. For each comp, state whether it argues for a higher or\n   lower value than its sale price when compared to the subject, and why\n   (size, condition, age, lot, location factors, market movement since sale\n   date). Use ranges, not false precision.\n\n3. SUGGESTED PRICE RANGE. A range (never a single number) with 2-3 sentences\n   of plain-English reasoning a homeowner can follow. Flag which comps you\n   weighted most and why. If the data supports a \"price to sell\" number vs a\n   \"price ambitiously\" number, give both.\n\n4. WHAT WOULD CHANGE THIS. Two sentences on what new information (interior\n   condition, updates, a new pending sale nearby) would move the range.\n\nWHEN ASKED TO RUN A NET SHEET AT $X, PRODUCE A TEXAS SELLER NET SHEET:\n\n- Sales price: $X\n- Owner's title policy (Texas promulgated rate, seller-paid by custom in most\n  TX contracts): use the current TDI rate table. If you do not have the exact\n  current table, calculate approx. 0.6-0.7% of sales price for typical DFW\n  price points and LABEL IT \"estimate - confirm with title company\".\n- Escrow fee (seller half): use the figure provided; else estimate $350-500\n  and label as estimate.\n- Property tax proration: seller owes taxes from Jan 1 to closing date because\n  Texas taxes are paid in arrears. Prorate the provided annual tax amount by\n  days. State the assumed closing date.\n- Real estate commission: use the rate(s) provided by the agent. Never assume\n  a \"standard\" rate; if none is given, show the line item blank and ask.\n- Loan payoff: use the provided figure; note that per-diem interest to closing\n  is additional.\n- Common extras if mentioned: HOA transfer/resale certificate ($150-400 typ.),\n  home warranty if seller-paid, survey if needed ($400-600 typ.), attorney doc\n  prep if applicable.\n- ESTIMATED NET TO SELLER, with every estimated line clearly marked.\n\nMANDATORY LANGUAGE RULES:\n- Always include, verbatim, at the end of any CMA output: \"This is a\n  comparative market analysis prepared by a licensed real estate agent, not an\n  appraisal, and was not prepared by a licensed appraiser. Estimated figures\n  are opinions of value and estimated costs, not guarantees.\"\n- Never use the words \"appraisal,\" \"appraised value,\" or \"certified\" to\n  describe this analysis.\n- Never reference demographics, school \"quality,\" crime, or the racial,\n  religious, or family composition of a neighborhood. Property and market\n  facts only.\n- Round all opinion-of-value figures to the nearest $5,000.\n```\n\n### HTML OUTPUT ADDENDUM (full build only, append to system prompt)\n\n```\nOUTPUT FORMAT: Return ONLY a complete self-contained HTML document, no\nmarkdown, no commentary. Single page, letter proportions, inline CSS only,\nno external assets. Structure: branded header (agent name, team, phone,\nlicense number from the input JSON), subject property summary card, comp\ntable, price range section with reasoning, net sheet table, disclaimer\nfooter in 9pt. Use the brand colors provided in the input JSON. Keep it\nunder 200 lines of HTML.\n```\n\n### TEASER PROMPT (lead-capture variant)\n\n```\nUsing ONLY the comps provided, produce a 3-sentence \"instant estimate\" email\nbody for a homeowner: a broad value range (widen the CMA range by 5% on each\nend, rounded to $10,000s), one sentence on what is driving values in their\narea based on the comps, and one sentence inviting them to book a free,\nno-obligation walkthrough for an exact number. Warm, confident, no hype, no\nexclamation points. End before the signature; the CRM appends it. Include\nthis line verbatim: \"This is an automated estimate based on recent nearby\nsales, not an appraisal. An exact recommendation requires seeing the home.\"\n```\n\n### DELIVERY EMAIL TEMPLATE (GHL email, teaser path)\n\n```\nSubject: Your home value estimate for {{contact.property_address}}\n\nHi {{contact.first_name}},\n\n{{ai_teaser_body}}\n\nGrab a time that works for you here: {{agent.calendar_link}}\n\n{{agent.signature}}\n```\n\n### CANVA TEMPLATE LAYOUT (starter version, one page)\n\n```\nPage 1 (letter, portrait):\n- Header band in brand color: logo left, \"Pre-Listing Market Analysis\" center,\n  agent name + phone + license number right\n- Subject property strip: address, beds/baths/sqft/year, one photo if you have it\n- Comp table block (paste the AI table; 6 rows max fits)\n- \"Suggested Range\" callout box: the range in large type, reasoning underneath\n- Net sheet table block (two columns: line item, amount)\n- Footer, small type: the verbatim not-an-appraisal disclaimer + brokerage name\n```\n\n### COMP PASTE FORMAT (starter version, what you paste from MLS)\n\n```\nSUBJECT: 4312 Warnock Ct, Fort Worth TX | 4bd/3ba | 2,850 sqft | built 2004 |\n0.25 ac | updated kitchen 2023, pool | annual taxes $9,800 | payoff approx $310,000\n\nCOMPS (sold, last 6 months, same subdivision):\n1. 4308 Warnock Ct | sold 5/2026 | $752,000 | 4/3 | 2,790 sqft | 12 DOM | no pool\n2. 4515 Ridgehaven Dr | sold 4/2026 | $780,000 | 4/3.5 | 3,010 sqft | 8 DOM | pool\n3. 4290 Warnock Ct | sold 3/2026 | $735,000 | 4/2.5 | 2,700 sqft | 21 DOM | original kitchen\n4. 4602 Ridgehaven Dr | sold 6/2026 | $795,000 | 5/3 | 3,100 sqft | 5 DOM | full remodel\n5. 4419 Stone Canyon | sold 2/2026 | $741,000 | 4/3 | 2,880 sqft | 30 DOM | backs to road\n```\n\n## 8. What It Costs\n\nAssumptions for AI usage: full build, Claude Sonnet API at approx. $3 per million input / $15 per million output tokens. One full CMA package is roughly 4k input + 5k output tokens, call it $0.09 each; a teaser is about $0.02. At 20 full packages and 100 teaser leads a month, API spend is approx. $4/mo. Even 5x that volume stays under $20/mo.\n\n### Starter\n\n| Item | Startup | Monthly |\n|---|---|---|\n| Claude Pro or ChatGPT Plus (optional but recommended) | $0 | $0-20 |\n| Canva template setup (your time, approx. 30-45 min, part of the initial hour) | $0 | $0 |\n| MLS / RPR access | already paying | $0 |\n| **Total** | **$0** | **$0-20** |\n\n### Full Build\n\n| Item | Startup | Monthly |\n|---|---|---|\n| GoHighLevel | $0 | $97-297 |\n| VPS for n8n (+ free Gotenberg PDF) | $0 | $5-10 |\n| Claude API | $5 initial credit load | approx. $2-10 |\n| Supabase (only if running a RESO feed) | $0 | $0-25 |\n| Cloud CMA (only if using it as the data source) | $0 | $0-35 (often free via MLS) |\n| Setup labor (operator, approx. 4-6 hrs) | one-time | $0 |\n| **Total** | **approx. $5** | **approx. $104-175 typical** ($120-160 for most setups; up to approx. $375 with GHL Unlimited + every optional layer) |\n\nIf you already run GHL and a VPS for other builds in this playbook, the marginal cost of adding this one is just the API usage: approx. $2-10/mo.\n\n## 9. Compliance & Gotchas\n\n- **It is not an appraisal. Ever.** In Texas, only a licensed appraiser produces an appraisal (Texas Occupations Code Ch. 1103). Agents may prepare a CMA/broker price opinion in the ordinary course of brokerage. Every output must carry the not-an-appraisal disclaimer, and you must never call it an appraisal in the document, the email, the ad copy, or your mouth. The prompts above bake this in; do not remove it.\n- **A licensee must review before a value opinion reaches a consumer.** The full CMA package is your professional opinion under your license. Auto-sending unreviewed AI valuations to consumers is how you end up explaining yourself to TREC. Keep the approval gate in step 8. The teaser range is deliberately broad and labeled automated, which is why it can flow without review, but read a sample weekly.\n- **Fair housing.** Never let comp selection, adjustments, or narrative reference protected classes, demographics, \"good/bad neighborhoods,\" school demographics, or crime. The prompt forbids it; you still own the output. Steering liability applies to AI-written words exactly as if you typed them.\n- **MLS data rules.** Your MLS data license typically allows you to use sold data to serve clients, but not to republish raw MLS data on public websites or feed it to third parties. The lead-capture teaser is fine because it outputs your derived opinion, not MLS records. A RESO feed (like Trestle) requires MLS approval and has its own display and use rules; read your agreement before piping it anywhere public.\n- **Commission rates.** Post-NAR-settlement, never present a commission as \"standard.\" The prompt intentionally leaves the rate blank until you supply it. Your net sheet should show the rate you actually negotiated on the listing agreement.\n- **Net sheet accuracy.** Title policy rates in Texas are promulgated by TDI and change; escrow fees vary by company. Label estimates as estimates, and have your title company run the official net sheet before closing. A seller who nets $4,000 less than your sheet promised is a grievance waiting to happen.\n- **A2P 10DLC.** If the lead-capture flow texts the teaser instead of emailing it, your GHL number must have an approved A2P registration, the form needs SMS consent language, and every text needs opt-out wording. Email-first avoids all of this on day one.\n- **Data privacy.** The lead form collects contact info tied to a property; say what you will do with it (a one-line privacy note under the form) and honor unsubscribes in GHL.\n- **Advertising rules.** The public \"home worth\" page is an advertisement: TREC requires your name as licensed, your brokerage name, and no misleading claims (\"guaranteed value\" is misleading). Add your license number; the IABS and Consumer Protection Notice links belong on the site it lives on.\n"}, {"id": "b08", "file": "08-single-property-websites.md", "nav": "Single-Property Websites", "group": "builds", "num": "08", "diff": "Medium", "lvl": 2, "starter": "$0-20", "full": "$9-15", "line": "Gives every listing its own branded one-page site and yard-sign QR code, with AI copy and every lead tagged in your CRM.", "md": "# Single-Property Websites on Autopilot\n\nEvery new listing gets its own branded one-page website and yard-sign QR code, in minutes instead of days, without paying $50 a listing to a website vendor.\n\n## 1. What It Is\n\nA single-property website is a one-page site dedicated to one listing. The address is the headline. Below it: a photo gallery, the property description, a features list, a map, a contact or showing-request form, and your name, photo, phone, and brokerage. The page lives at its own web address, something like 4312-warnock-ct.yoursite.com, and a QR code on the yard sign and flyers sends drive-by traffic straight to it.\n\nThis build makes that automatic. You feed in the MLS data sheet and the photo folder, AI writes the page content, and the finished site publishes itself. The lead form on the page drops every inquiry directly into your CRM, so a neighbor who scans the sign at 9 pm becomes a contact with a tag and a follow-up sequence before you wake up.\n\n## 2. Why You Need It\n\nVendors like listing-website services charge $30-60 per listing or $30-100 a month for the privilege. Building one by hand in a site builder takes 2-4 hours if you are comfortable, longer if you are not. This build gets the Starter version to about 30 minutes per listing and the Full Build to about 5 minutes of your time, most of which is dragging photos into a folder. At 20 listings a year, that is roughly 40-70 hours recovered, plus $600-1,200 in vendor fees you stop paying.\n\nThe bigger win is lead capture. A yard sign with a phone number converts drive-bys only if they call. A QR code to a page with photos, price, and a \"Request a showing\" form converts the curious, and every one of them lands in your CRM with the property tagged. Sellers also love it: \"your home gets its own website\" is a listing-presentation line that wins appointments, and it costs you almost nothing to deliver.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|------|---------------------------|-------|--------------|\n| Chat AI subscription | Writes the page copy, headline, features list, and social blurb from the MLS printout | Claude Pro $20/mo or ChatGPT Plus $20/mo; free tiers work for Starter | Already have either? It works. Free Claude/ChatGPT handles 1-2 listings a month |\n| Page builder (Starter) | Hosts the one-page site | Canva free (Canva Sites included); Canva Pro approx. $12/mo billed annually ($144/yr), $18 month-to-month | GHL funnel page (included in your $97 plan), Carrd ($19/yr), your brokerage's landing-page tool if it allows custom pages |\n| CRM | Receives leads from the form, tags them, fires follow-up | GoHighLevel $97/mo Starter or $297/mo Unlimited | Follow Up Boss, BoldTrail/kvCORE (often brokerage-provided and free to you), Lofty, or your brokerage's free CRM. Any CRM with a form or inbound webhook works |\n| QR code generator | Turns the page URL into a sign-ready QR | Free (Canva built-in, or qrserver.com API) | Any free QR site; avoid \"free trial\" QR services that expire your code |\n| Hosting (Full Build) | Serves the HTML template sites on your domain | Hostinger shared hosting approx. $3-4/mo on a 12-month term (renews approx. $12.99/mo); Vercel Pro $20/mo | Vercel Hobby is free but prohibits commercial use, so use Hostinger or Vercel Pro for listing sites. GitHub Pages is free and allowed |\n| GitHub account | Stores the template; pushing a new listing folder auto-deploys the site | Free | Required for Full Build only |\n| Automation platform (Full Build) | Glues CRM trigger, AI, GitHub, and QR together | n8n self-hosted on a $5-10/mo VPS, or n8n Cloud from about $24/mo | Make (free tier, then approx. $10/mo), Zapier (approx. $20-30/mo for multi-step) |\n| Claude API (Full Build) | Generates page content inside the automation, no human in the chat | Pay per use, roughly $0.02-0.05 per listing | OpenAI API equivalent works the same way |\n\nCheapest possible path: free Canva account, free ChatGPT or Claude, your brokerage's existing CRM form, free QR generator. That is $0/month and covers the entire Starter version.\n\n## 4. How It Works\n\n1. Data in. You mark a listing \"Live\" in your CRM (or fill out a short internal form) and drop the photos in a shared folder. The MLS data sheet text rides along in a notes field.\n2. AI writes. The automation sends the raw MLS data to Claude with a fixed prompt that returns structured content: headline, description, feature bullets, open house line, and photo captions.\n3. Page builds. The automation injects that content plus the photo filenames into a reusable HTML template and pushes it to GitHub as a new folder.\n4. Site deploys. GitHub auto-deploy publishes it to your hosting in under a minute at a clean URL on your domain.\n5. Outputs land. A QR code PNG is generated from the URL, and you get an email or SMS with the live link and the QR file. The page's contact form posts every lead back into your CRM, tagged with the property address.\n\nWhy this architecture: the template plus static hosting means every site looks on-brand, loads fast on a phone (which is where 90 percent of QR scans happen), and costs pennies. The CRM stays the single source of truth for leads, and AI only writes content, it never touches the lead data.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\nYou will build one reusable template in Canva Sites (or a GHL funnel), then clone and fill it per listing. Budget 45 minutes for the one-time setup, then about 30 minutes per listing.\n\n1. Build the master template. In Canva, click Create a design, search \"Website,\" and pick a real estate one-pager template. Arrange these sections top to bottom: full-width hero photo with the address as the headline, price and beds/baths/sqft strip, photo gallery grid (8-12 frames), \"About this home\" paragraph block, features list (two columns of bullets), an embedded map screenshot, a \"Request a showing\" section, and a footer with your headshot, name, phone, brokerage name, and Equal Housing logo. Name it \"LISTING TEMPLATE - DO NOT PUBLISH.\"\n2. Handle the form. Canva Sites does not have native forms. Two options: (a) in your CRM, create a form (in GHL: Sites, then Forms, then Builder, add Name/Phone/Email/Message, save) and link its share URL from a big \"Request a Showing\" button in Canva; or (b) if you built the page as a GHL funnel instead of Canva, drag the form element directly onto the page. Option (b) is why GHL users should skip Canva and use a funnel template: the lead lands in the CRM natively.\n3. Set up the AI copy prompt. Open Claude or ChatGPT, paste the \"Listing Site Content\" prompt from Section 7, and save the conversation (or save it as a Project/Custom GPT) so you can reuse it every listing.\n4. Per listing, generate the content. Print the MLS data sheet to PDF (in Matrix: select the listing, Print, choose the full agent report, PDF). Upload that PDF or paste its text into your saved AI chat. You get back a headline, description, features, and captions in labeled blocks.\n5. Clone and fill. In Canva, open the template, click File, then Make a copy, rename it to the address. Paste the AI blocks into the matching text frames. Drag the listing photos into the gallery frames (Canva auto-crops). Screenshot the property on Google Maps and drop it in the map frame.\n6. Publish. Click Share, then Publish as Website. Free Canva gives you a my.canva.site/address-name URL; Canva Pro lets you attach your own domain or subdomain. Copy the live URL.\n7. Make the QR code. In Canva, open your sign rider or flyer design, click Apps in the left rail, search \"QR Code,\" paste the live URL, and place the generated code. Print at least 2 inches square for a flyer, 4-6 inches for a sign rider, and test the scan from 6 feet away with your own phone before sending to print.\n8. Wire the follow-up. In your CRM, set the form's automation so a new submission gets tagged with the property address and receives an instant text: \"Thanks for your interest in 4312 Warnock Ct! I'll reach out shortly. Want to see it in person? Reply SHOW.\" (In GHL: Automation, then Workflows, trigger = Form Submitted, filter to this form.)\n\nThat is the whole Starter loop. The only per-listing work is steps 4-7.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nTarget state: agent drags photos into a folder and moves the opportunity to \"Live\" in GHL; five minutes later the site is live at 4312-warnock-ct.homes.agentsite.com (or agentsite.com/homes/4312-warnock-ct), the QR is in their inbox, and the form is wired. Operator setup takes an afternoon.\n\n1. Build the HTML template once. One folder containing index.html, style.css, and an img/ subfolder. The HTML uses placeholder tokens: {{ADDRESS}}, {{PRICE}}, {{BEDS}}, {{BATHS}}, {{SQFT}}, {{SUBHEADLINE}}, {{DESCRIPTION}}, {{FEATURES_LIST}}, {{OPEN_HOUSE_LINE}}, {{PHOTO_TAGS}}, {{MAP_EMBED}}, {{AGENT_NAME}}, {{AGENT_PHONE}}, {{AGENT_EMAIL}}, {{BROKER_NAME}}, {{FORM_WEBHOOK_URL}}. Make it mobile-first: the QR audience is standing on a sidewalk. Use a free Google Maps embed iframe (Share, then Embed a map, no API key needed) for {{MAP_EMBED}}. Have Claude Code build this template for you in one session if you do not want to hand-code it.\n2. Set up hosting and the repo. Create a GitHub repo \"listing-sites\" with the template in a /_template folder. On Hostinger: hPanel, then Websites, then your domain, then create a subdomain \"homes\" (Domains, then Subdomains, type \"homes\", Create). Then hPanel, then Advanced, then Git: paste the repo URL, branch main, deploy path = the homes subdomain's directory, and enable Auto Deployment (Hostinger gives you a webhook URL; add it in GitHub under Settings, then Webhooks). Note: Hostinger auto-deploy requires the repo to be public, so keep API keys and anything private out of it. Each listing becomes a folder in the repo, so the live URL pattern is homes.agentsite.com/4312-warnock-ct/. (True per-listing subdomains need a wildcard DNS record and per-site config; the path version looks nearly identical on a sign QR and takes zero extra setup, so start there.) Vercel Pro works the same way with zero webhook setup: import the repo, every push deploys.\n3. Photos intake. Create a Google Drive (or Dropbox) folder \"Listing Photos\" with one subfolder per address. Agent drops MLS-ready photos there. In n8n you will read this folder with the Google Drive node; get the sharing link or connect OAuth once (n8n: Credentials, then New, then Google Drive OAuth2).\n4. The trigger, in GHL. Create a pipeline \"Listings\" with a stage \"Live - Build Site.\" Add two custom fields on the Opportunity: \"MLS Data Sheet\" (multi-line text, paste the full data sheet or a Matrix export) and \"Photos Folder Link.\" Then Automation, then Workflows, then Create Workflow: trigger = Pipeline Stage Changed, filter Pipeline = Listings, Stage = Live - Build Site. Add action = Webhook (POST), URL = your n8n webhook URL from step 5, and in the payload map: address, list price, beds, baths, sqft, the MLS Data Sheet field, the Photos Folder Link field, and the assigned agent's name/phone/email. Zapier/Make equivalent: trigger \"Pipeline Stage Changed\" in the GHL (LeadConnector) app, or a stage-change webhook from Follow Up Boss/BoldTrail, then the same steps below as Zapier actions or Make modules.\n5. The n8n workflow. Create a new workflow, first node = Webhook (method POST). Copy its Production URL; that is what you pasted into GHL in step 4. Then chain:\n   a. Google Drive node: list files in the photos folder from the payload link, sort by filename.\n   b. HTTP Request or Anthropic node: call the Claude API (current Sonnet model, copy the exact model ID from the Models page in the Anthropic console; max_tokens 2000) with the system prompt and user prompt from Section 7, passing the MLS data sheet text. Ask for JSON out, and add a Code node after it that runs JSON.parse with a try/catch so a malformed response fails loudly instead of publishing garbage.\n   c. Code node: load the template HTML (store it in the workflow as a string, or fetch the raw file from GitHub), then replace each {{TOKEN}} with the parsed JSON fields, and build the {{PHOTO_TAGS}} block by looping the Drive file list into img tags (download the photos in a Google Drive download node and include them in the commit, or hotlink Drive thumbnails for v1).\n   d. GitHub node: operation Create/Update File, repo listing-sites, path = 4312-warnock-ct/index.html (slugify the address in the Code node: lowercase, spaces to hyphens, strip punctuation), commit message \"Add {{ADDRESS}}\". Add additional GitHub file operations for the photos. This push triggers the auto-deploy from step 2.\n   e. HTTP Request node: GET https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=https://homes.agentsite.com/4312-warnock-ct/ with response format File. That returns a print-ready QR PNG.\n   f. Email node (Resend, or GHL email via a second inbound webhook): send the agent \"Site is live\" with the URL and the QR PNG attached. Optionally also a GHL SMS.\n   Zapier/Make equivalent, one line each: Webhooks trigger; ChatGPT/Claude step with the same prompt; Formatter/Code step for token replacement; GitHub \"Create File\" action; Webhooks GET to qrserver; Gmail/Email send.\n6. Lead form wiring back to GHL. In GHL: Automation, then Workflows, then Create Workflow, trigger = Inbound Webhook. GHL displays a webhook URL; copy it. That URL is your {{FORM_WEBHOOK_URL}} baked into the template. The template's form (see Section 7) posts name, phone, email, message, and property_address as JSON to it. In the workflow, add actions: Create/Update Contact (map the fields), Add Tag = \"listing-lead\" and a tag with the address slug, then your notify-agent and instant-text steps. Because the address rides along in every submission, one webhook and one workflow serve every listing site you ever publish. Follow Up Boss equivalent: POST the same fields to the FUB API events endpoint with your API key, or use a Zapier \"Webhook catch\" that creates the FUB contact.\n7. Test end to end. Move a dummy opportunity to Live - Build Site with a real MLS sheet pasted in. Confirm: n8n execution green, site live at the URL within 2 minutes, photos rendering, QR scans to the page on your phone, form submission creates a tagged contact in GHL, agent email arrived. Then test on an actual phone at 375px width: no horizontal scroll, tap targets big enough, form usable with one thumb.\n8. Sold/expired cleanup. Add a second GHL workflow on stage \"Closed\" that hits a small n8n webhook which commits a one-line change: replace the form section with a \"This home has sold. Want to know what it means for your home's value?\" CTA linking to your home-valuation page. Never just delete the page; the QR codes in the wild keep working and now farm the neighborhood.\n\n## 7. Prompts & Templates\n\nListing Site Content prompt (Starter: paste into chat with the data sheet. Full Build: system prompt = first paragraph, user message = the rest plus the data):\n\n```\nYou are a real estate listing copywriter for a licensed Texas agent. You write\naccurate, fair-housing-compliant marketing copy. Describe the property and its\nfeatures only. Never describe or imply anything about the people who might live\nthere, the neighbors, demographics, safety, crime, schools' quality, or \"family\"\nsuitability. Never invent features not present in the source data. No em dashes.\n\nFrom the MLS data sheet below, produce the following, and output ONLY valid JSON\nwith exactly these keys:\n\n{\n  \"headline\": \"The full street address, exactly as listed\",\n  \"subheadline\": \"One line: price | beds | baths | sqft, formatted for humans\",\n  \"description\": \"150-200 words, warm but factual, written for a buyer standing\n                  on the sidewalk who just scanned a QR code. Lead with the two\n                  strongest selling points from the data. Mention layout, lot,\n                  updates, and location facts that appear in the sheet.\",\n  \"features\": [\"8 to 12 short bullets pulled straight from the data sheet:\n               year built, lot size, garage, HVAC age, roof age, upgrades,\n               HOA if any, school DISTRICT NAME only (no quality claims)\"],\n  \"open_house_line\": \"If the sheet shows an open house, one line with day and\n                      time. If not, an empty string.\",\n  \"photo_captions\": [\"One short caption per photo area if room names are\n                     inferable from the sheet, otherwise an empty array\"],\n  \"social_blurb\": \"Under 200 characters for Instagram, includes price and one\n                   hook, ends with 'Link in bio.' No hashtags.\"\n}\n\nMLS DATA SHEET:\n[PASTE FULL DATA SHEET TEXT HERE]\n```\n\nHTML template skeleton (Full Build, /_template/index.html; hand to Claude Code with \"style this mobile-first, 375px viewport, 44px touch targets, 16px+ body text\"):\n\n```html\n<title>{{ADDRESS}} | Presented by {{AGENT_NAME}}, {{BROKER_NAME}}<\/title>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<meta property=\"og:title\" content=\"{{ADDRESS}}\">\n<meta property=\"og:description\" content=\"{{SUBHEADLINE}}\">\n<meta property=\"og:image\" content=\"img/photo-1.jpg\">\n<link rel=\"stylesheet\" href=\"style.css\">\n\n<header class=\"hero\" style=\"background-image:url('img/photo-1.jpg')\">\n  <h1>{{ADDRESS}}<\/h1>\n  <p class=\"subhead\">{{SUBHEADLINE}}<\/p>\n  <a class=\"cta\" href=\"#showing-form\">Request a Showing<\/a>\n<\/header>\n\n<section class=\"gallery\">\n  {{PHOTO_TAGS}}\n  <!-- automation emits: <img src=\"img/photo-2.jpg\" alt=\"caption\" loading=\"lazy\"> ... -->\n<\/section>\n\n<section class=\"about\">\n  <h2>About This Home<\/h2>\n  <p>{{DESCRIPTION}}<\/p>\n  <p class=\"open-house\">{{OPEN_HOUSE_LINE}}<\/p>\n<\/section>\n\n<section class=\"features\">\n  <h2>Features<\/h2>\n  <ul>{{FEATURES_LIST}}<\/ul>\n  <!-- automation emits one <li> per feature bullet -->\n<\/section>\n\n<section class=\"map\">{{MAP_EMBED}}<\/section>\n\n<section class=\"contact\" id=\"showing-form-section\">\n  <h2>See It In Person<\/h2>\n  <!-- lead form goes here, see below -->\n<\/section>\n\n<!-- footer block goes here, see below -->\n```\n\nLead form for the HTML template (posts to the GHL inbound webhook):\n\n```html\n<form id=\"showing-form\">\n  <input type=\"text\" name=\"name\" placeholder=\"Your name\" required>\n  <input type=\"tel\" name=\"phone\" placeholder=\"Phone\" required>\n  <input type=\"email\" name=\"email\" placeholder=\"Email\" required>\n  <textarea name=\"message\" placeholder=\"Questions? Preferred showing time?\"><\/textarea>\n  <button type=\"submit\">Request a Showing<\/button>\n  <p class=\"consent\">By submitting, you agree to receive calls and texts about\n  this property from {{AGENT_NAME}}, {{BROKER_NAME}}. Msg rates may apply.\n  Reply STOP to opt out.<\/p>\n<\/form>\n<script>\ndocument.getElementById('showing-form').addEventListener('submit', async (e) => {\n  e.preventDefault();\n  const f = e.target;\n  const payload = {\n    name: f.name.value, phone: f.phone.value, email: f.email.value,\n    message: f.message.value, property_address: '{{ADDRESS}}',\n    source: 'single-property-site'\n  };\n  f.querySelector('button').textContent = 'Sending...';\n  await fetch('{{FORM_WEBHOOK_URL}}', {\n    method: 'POST',\n    headers: {'Content-Type': 'application/json'},\n    body: JSON.stringify(payload)\n  });\n  f.innerHTML = '<p class=\"thanks\">Got it! I\\'ll text you shortly to set up a showing.<\/p>';\n});\n<\/script>\n```\n\nFooter block, required on every page (fill once in the template):\n\n```html\n<footer>\n  <img src=\"img/agent.jpg\" alt=\"{{AGENT_NAME}}\">\n  <p>{{AGENT_NAME}}, REALTOR&reg;<br>\n     {{BROKER_NAME}}<br>\n     {{AGENT_PHONE}} | {{AGENT_EMAIL}}<\/p>\n  <p class=\"legal\">Listing courtesy of {{BROKER_NAME}}. Information deemed\n  reliable but not guaranteed. Equal Housing Opportunity.<\/p>\n  <img src=\"img/eho.png\" alt=\"Equal Housing Opportunity\" width=\"40\">\n<\/footer>\n```\n\nAgent notification email (n8n email node body):\n\n```\nSubject: Site live: {{ADDRESS}}\n\nYour single-property site is live:\nhttps://homes.agentsite.com/{{SLUG}}/\n\nQR code attached (print at 4-6 inches for the sign rider, 2 inches minimum\non flyers). Test-scan it before sending anything to print.\n\nForm leads will hit your CRM tagged \"{{SLUG}}\".\n```\n\n## 8. What It Costs\n\nStarter\n\n| Item | Startup | Monthly |\n|------|---------|---------|\n| Canva free + built-in QR | $0 | $0 |\n| Claude Pro or ChatGPT Plus (optional, free tier covers 1-2 listings/mo) | $0 | $0-20 |\n| Custom domain on Canva Pro (optional) | $0 | $12 (annual rate) |\n| Total | $0 | $0-20 typical |\n\nFull Build\n\n| Item | Startup | Monthly |\n|------|---------|---------|\n| Hostinger shared hosting (12-mo term, approx.) | ~$40/yr | $3-4 (renews approx. $12.99) |\n| Domain (if you do not own one) | ~$15/yr | ~$1.25 |\n| GHL Starter (skip if brokerage CRM has forms + webhooks) | $0 | $97 |\n| n8n self-hosted on shared VPS you already run | $0 | $5-10 (or $0 if the VPS already exists) |\n| Claude API: ~3,000 tokens in / 1,500 out per listing on Sonnet, 5 listings/mo | $0 | well under $1 |\n| Template build (one-time, DIY with Claude Code or hire out) | 0-4 hours | $0 |\n| Total | ~$55 first year | $9-15 without GHL, $106-112 with GHL |\n\nAssumptions: Claude Sonnet-class API pricing at roughly $3 per million input tokens and $15 per million output tokens; even at 20 listings a month the AI bill stays under $1. GHL is listed at full price, but most agents adopting this build already pay for a CRM, so the true incremental monthly cost is usually the hosting line only.\n\n## 9. Compliance & Gotchas\n\n- Broker identification is mandatory. TREC advertising rules require your broker's name on all advertising, and the page and the flyer both count. Bake broker name (and license info where your state requires it) into the template footer so it can never be forgotten. Most states and MLS rules have an equivalent; check yours.\n- Advertise only your own listings, or get written permission. Building a single-property site for another agent's listing without the listing broker's written consent violates MLS rules and, in Texas, TREC advertising rules. This build is for your listings (or your team's, with the listing agent attributed).\n- Fair housing lives in the copy. The prompt bans people-descriptions, school quality claims, and neighborhood demographic language, but AI can still slip. A human reads every description before it publishes. Words to catch: \"safe,\" \"family-friendly,\" \"perfect for,\" \"exclusive,\" anything about who the buyer is.\n- AI invents features. If the data sheet is thin, models pad. The prompt forbids invention, but verify the description against the sheet: roof age, upgrades, and school district are the usual hallucinations. Wrong facts in advertising are a license problem, not just an embarrassment.\n- Photos: use only images you have rights to. Your listing photos are typically licensed from the photographer; confirm your agreement covers marketing sites. Never pull photos from another agent's old listing of the same house.\n- Seller permission. Get marketing consent in the listing agreement (most standard listing agreements cover it). If the sellers still occupy, do not publish photos showing valuables, family photos on walls, or anything identifying children.\n- A2P 10DLC for the instant text-back. The \"Reply SHOW\" auto-text only works if your GHL (or CRM) phone number has an approved A2P registration. Unregistered numbers get filtered. The form's consent line above is your opt-in language; keep it.\n- Form data privacy. You are collecting names, phones, and emails. Serve the site over HTTPS (Hostinger and Vercel both include SSL free), do not log form payloads anywhere public, and remember the GitHub repo is public on Hostinger auto-deploy: keep API keys and lead data out of it. The webhook URL in the page source is visible to anyone; that is normal and acceptable, but never embed API keys client-side.\n- Vercel Hobby prohibits commercial use. Listing marketing is commercial. Use Hostinger, GitHub Pages, or Vercel Pro.\n- Do not display IDX-style data you are not entitled to. This build uses your own listing's data sheet, which is fine. Pulling other listings, sold comps, or \"similar homes nearby\" onto the page drags you into IDX display rules and MLS data licensing. Keep the page about the one property.\n- QR codes die with lazy vendors. Use a direct URL QR (like qrserver or Canva's), not a \"dynamic QR\" trial service that redirects through their domain and breaks when the trial ends. Your sign rider may outlive the vendor.\n- When the listing sells, edit, do not delete. Killing the page 404s every printed QR still in circulation. Swap the form for a sold banner and a valuation CTA and let the page keep farming.\n"}, {"id": "b09", "file": "09-post-closing-content-engine.md", "nav": "Post-Closing Engine", "group": "builds", "num": "09", "diff": "Medium", "lvl": 2, "starter": "$0-20", "full": "$110-160", "line": "Fires a Just Closed post for approval, a compliant review sequence, and home-anniversary enrollment the moment a deal funds.", "md": "# The Post-Closing Content + Review Engine\n\nEvery closing automatically becomes a social post, a five-star review request, and a client for life, without you touching anything on closing day.\n\n## 1. What It Is\n\nThis build watches for one moment: the day a deal closes. The second that happens, three things fire on their own. First, a branded \"Just Closed\" graphic and caption get generated and dropped in your lap for a one-tap approval before posting. Second, your client gets a friendly text and email asking for a Google review, with a polite reminder a week later if they have not left one. Third, the closing date gets saved as that client's \"home anniversary,\" which quietly schedules a one-year equity report and anniversary touch down the road.\n\nIn plain terms: the machine handles the follow-through that every agent knows they should do after closing and almost nobody actually does, because closing day is chaos and the next deal is already on fire.\n\n## 2. Why You Need It\n\nThe week after closing is the single highest-trust window you will ever have with a client, and it is exactly when most agents go silent. Clients asked within 3 days of closing leave reviews at several times the rate of clients asked a month later, and agents with 50+ Google reviews consistently out-convert agents with 5 when a referral checks them out online. Meanwhile, NAR's own surveys show most sellers say they would use their agent again, but only a small fraction actually do, largely because the agent never stayed in touch. The anniversary enrollment in this build is how you stop leaking repeat business.\n\nOn time: a Just Closed post, a review ask, a reminder, and a calendar note takes a diligent agent 45-60 minutes per closing. At 20 closings a year, that is roughly 20 hours of admin work this build does for free, and unlike you, it never forgets the reminder text.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| CRM with a \"Closed\" stage | The trigger. Marking a deal closed starts everything | GoHighLevel $97/mo (Starter) or $297/mo (Unlimited) | Follow Up Boss, kvCORE/BoldTrail (often free from your brokerage), Lofty. Already have a brokerage CRM with stages and automations? It works |\n| AI chat subscription | Writes captions, review asks, and anniversary notes (Starter version) | Claude Pro $20/mo | ChatGPT Plus $20/mo; free tiers work for Starter at lower volume |\n| AI API (Full Build only) | Generates personalized copy inside the automation, no chat window | Claude API, pay per use, roughly $1-3/mo at this volume | OpenAI API equivalent |\n| Automation platform (Full Build only) | Catches the \"deal closed\" event and runs the sequence | n8n self-hosted on a ~$5-10/mo VPS, or n8n Cloud approx. $24/mo | Make (from approx. $9-10/mo), Zapier (from approx. $19.99/mo annual). GHL's built-in workflows can do most of this alone |\n| Graphic tool | The \"Just Closed\" image | Canva Free or Pro approx. $15/mo | HTML template + screenshot (free, Full Build), your brokerage's template library, or a designer's template pack you already own |\n| Google Business Profile | Where the reviews land | Free | Zillow or Facebook reviews as a secondary target |\n| Photo of the house/clients | The graphic needs an image | Free (your listing photos or a closing-table phone pic) | Listing hero shot, key-handoff photo, or a branded no-photo layout |\n\n**Cheapest possible path:** free CRM from your brokerage (or a spreadsheet), free Canva, free ChatGPT or Claude tier, and the Starter checklist below. Total: $0/mo. You do the clicking; the AI does the writing.\n\n## 4. How It Works\n\n1. **Trigger:** your deal hits stage = Closed in the CRM (or, if you work with a partnered title company, their closing notification fires the event for you).\n2. **AI writes:** the client's name, address, side (buyer/seller), and one personal detail flow into an AI prompt that writes the caption, the review-request text and email, and the anniversary note.\n3. **Graphic renders:** the address and photo drop into a branded template (Canva or an HTML template screenshotted by the automation) to produce the Just Closed image.\n4. **You approve:** graphic + caption land in your inbox or a pending-approval task. One tap to approve, then it posts or you post it.\n5. **Sequence runs:** review text goes out day 1, review email day 2, polite nudge day 8 (skipped if a review already appeared), and the closing date is written to an anniversary field that the Home Anniversary build (build 04) picks up in 11 months.\n\nWhy this architecture: the CRM is the single source of truth for \"closed,\" so you never trigger off memory. The AI only writes copy; it never sends anything client-facing without the sequence you approved, and the graphic always passes through your eyes before it touches social. Automation handles timing, you handle judgment.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\nThe Starter version is a closing-day ritual: 15 minutes per closing, powered by a checklist and two saved prompts.\n\n1. **Get your Google review link.** Go to business.google.com, sign in, click your business profile, then click \"Ask for reviews.\" Copy the short link (it looks like g.page/r/XXXX/review). Paste it into a note on your phone titled \"Review Link.\" If you do not have a Google Business Profile, create one first at google.com/business (takes 10 minutes plus a verification step).\n2. **Build your Just Closed template once.** Open Canva (free), search templates for \"just closed real estate,\" pick one, and replace the colors, logo, and font with your brand. Rename it \"MASTER Just Closed\" and never edit the master again; always click \"Make a copy\" per closing.\n3. **Save the two prompts.** Copy Prompt A (caption) and Prompt B (review ask) from Section 7 into a note, a Claude Project, or a ChatGPT custom instruction. This is your closing-day toolkit.\n4. **Create the checklist.** Put this in your phone's notes or task app as a template you duplicate per closing:\n   - Copy Canva master, drop in property photo and address, export PNG\n   - Run Prompt A in Claude/ChatGPT, paste details, get caption\n   - Post graphic + caption to Instagram and Facebook (get client photo permission first)\n   - Run Prompt B, get the review text and email\n   - Send the review text from your phone, send the email\n   - Set a phone reminder for 7 days out: \"Review nudge: [client name]\"\n   - Add a calendar event 1 year out on the closing date: \"Home anniversary: [client name], [address]\" with a note to run the anniversary play (build 04)\n5. **On each closing day, run the checklist.** Total time is about 15 minutes once you have done it twice.\n6. **Day 7, when the reminder fires:** check your Google profile. If no review, send the nudge text from Section 7. If they reviewed, send the thank-you text instead. Either way, you are done.\n\nThat is genuinely the whole system. It works with zero automation; the automation just removes the checklist.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nAssumes GHL for the CRM, n8n for automation, and the Claude API for copy. Zapier/Make equivalents are noted per step. Budget 2-3 hours the first time.\n\n1. **Prep the CRM fields.** In GHL: Settings > Custom Fields > Add Field. Create these on the Contact object: `property_address` (text), `deal_side` (dropdown: Buyer/Seller), `closing_date` (date), `personal_detail` (text, one line like \"first home, two golden retrievers\"), `home_anniversary` (date). In GHL, also confirm your pipeline has a stage literally named \"Closed.\"\n2. **Get a Claude API key.** console.anthropic.com > API Keys > Create Key. Copy it once; it will not show again. Load $5 of credit, which will last months at this volume.\n3. **Build the n8n webhook catcher.** In n8n, create a new workflow named \"Post-Closing Engine.\" Add a Webhook node, method POST, path `post-closing`. Copy the production URL it shows (like `https://your-n8n.yourdomain.com/webhook/post-closing`). *Zapier/Make: create a Zap/scenario starting with \"Webhooks by Zapier: Catch Hook\" or Make's \"Custom webhook\" and copy that URL instead.*\n4. **Wire GHL to fire it.** In the GHL sub-account: Automation > Workflows > Create Workflow > Start from Scratch. Trigger: \"Pipeline Stage Changed,\" filter Pipeline = your sales pipeline, Stage = Closed. First action: \"Webhook,\" method POST, URL = the n8n URL from step 3. In the webhook's custom data, map: `first_name`, `last_name`, `email`, `phone`, `property_address`, `deal_side`, `closing_date`, `personal_detail`, and `contact_id`. Save and publish the workflow. *Title-company variant: if your title partner (like CNAT) sends closing notifications, point their webhook or a parsed-email trigger at the same n8n URL; the payload just needs the same fields.*\n5. **Add the AI copy node.** In n8n after the Webhook node, add an HTTP Request node (or the Anthropic node if installed). POST to `https://api.anthropic.com/v1/messages` with headers `x-api-key: YOUR_KEY`, `anthropic-version: 2023-06-01`, `content-type: application/json`. Body: model `claude-sonnet-4-5`, max_tokens 1500, and a single user message containing the Full Build prompt from Section 7 with the webhook fields injected via n8n expressions (like `{{ $json.body.first_name }}`). The prompt asks for JSON back: caption, review_sms, review_email_subject, review_email_body, nudge_sms. Add a Code node after it with one line to `JSON.parse` the text block out of the response. *Zapier: use the \"Anthropic (Claude)\" app's \"Send Message\" action; Make: the Anthropic module; both then need a JSON parse step.*\n6. **Generate the graphic.** Two paths:\n   - **HTML template path (free, Bradley's default):** build a 1080x1080 HTML file with your brand colors, a photo slot, \"JUST CLOSED,\" the address, and your logo. Host it on your site with query params (`?address=...&photo=...`). In n8n, add an HTTP Request node calling a screenshot API such as ScreenshotOne or ApiFlash (both have free tiers around 100 shots/mo; you pass your template URL plus width=1080, height=1080 and get a PNG back), or run Playwright/Puppeteer on the same VPS via an Execute Command node to capture the URL as a PNG.\n   - **Canva path (easier):** keep a \"MASTER Just Closed\" brand template. The automation sends you the caption and the property details; you spend 90 seconds dropping them into a copy of the template. Canva's API/Bulk Create exists but a template copy is honestly faster at agent volume.\n7. **Send yourself the approval.** Add a Gmail/SMTP/Resend node in n8n that emails you (or an internal GHL SMS to your own number): subject \"APPROVE: Just Closed - {{address}}\", body containing the caption, the graphic (attached or linked), and the review copy. Nothing posts publicly without this. If you want true one-tap posting after approval, add an n8n Wait-for-Webhook approval step and connect a social-posting node (or GHL's Social Planner via API) on approve.\n8. **Send the review sequence back through GHL.** Best practice: let GHL send all client-facing messages so replies, opt-outs, and history live in one inbox. In the same GHL workflow from step 4, after the webhook action add: Wait 1 day > SMS action (paste the review SMS template from Section 7, using custom values) > Wait 1 day > Email action (review email template) > Wait 6 days > If/Else on tag `left-review` > if tag absent, SMS (nudge template). You add the `left-review` tag manually when a review appears, or wire a review-monitoring step in n8n (poll the Google Business Profile API daily, add the tag via GHL API when a new review matches the client's first name). *Zapier/Make: same chain using Delay steps and the GHL/FUB \"Send SMS/Email\" actions.*\n9. **Enroll the long game.** Final GHL workflow actions: \"Update Contact Field\" to copy `closing_date` into `home_anniversary`, and \"Add Tag\" `anniversary-enrolled`. The Home Anniversary build (build 04) triggers off that field 11 months later with the 1-year equity report. No MLS feed? The equity report in build 04 has a no-feed path using an RPR report or a Cloud CMA; nothing in this build requires MLS data.\n10. **Test end to end.** Create a test contact with your own phone and email, fill every custom field, drag a test opportunity to Closed, and watch: n8n execution log shows the webhook, the approval email arrives with real copy, the SMS hits your phone the next day (temporarily shorten the waits to 2 minutes for testing), and the anniversary field is populated. Fix field-name typos now, not on a real client.\n\n**Common failure points, in the order you will hit them:**\n\n- Webhook fires but n8n shows nothing: you copied the Test URL instead of the Production URL, or the workflow is not activated (toggle top right). Production URLs only listen when the workflow is active.\n- n8n receives the payload but fields are empty: GHL sends custom values only if you mapped them in the workflow webhook's Custom Data section; a bare webhook action sends almost nothing useful.\n- Claude returns prose instead of JSON: your prompt lost the \"Return ONLY valid JSON\" line, or the model wrapped it in markdown fences; strip fences in the Code node before parsing.\n- SMS never arrives: A2P registration is still pending (see Section 9) or the test contact has DND enabled in GHL. Check Contact > DND settings.\n- Sequence fires on old deals: the trigger \"Pipeline Stage Changed\" only fires on the change event, but bulk-editing old opportunities to Closed will fire it for every one. Never mass-update the pipeline while this workflow is published.\n\n## 7. Prompts & Templates\n\n**Prompt A: Just Closed caption (Starter, paste into Claude/ChatGPT)**\n\n```\nYou write social captions for a real estate agent. Write a \"Just Closed\" caption for Instagram and Facebook.\n\nDetails:\n- Client first name(s): [NAMES]\n- Property area (neighborhood/city only, not full address): [AREA]\n- Buyer or seller: [SIDE]\n- One personal detail about them or the journey: [DETAIL]\n- My name and brokerage: [NAME], [BROKERAGE]\n\nRules:\n- 3 short paragraphs max, warm and specific, no cliches like \"dreams do come true\"\n- Celebrate the client, not me\n- No purchase price, no financial details, no full street address\n- End with a soft line inviting DMs from anyone thinking about buying or selling\n- Include 5 hashtags: 2 local, 2 real estate, 1 branded\n- Give me 2 versions: one heartfelt, one fun\n```\n\n**Prompt B: Review request pack (Starter)**\n\n```\nWrite a Google review request for my just-closed real estate client. I need 4 pieces:\n\n1. A text message (under 320 characters), warm, personal, one specific callback to their transaction, with this link at the end: [REVIEW LINK]\n2. A short email (subject + 90-120 word body) with the same ask and link\n3. A polite 7-day nudge text (under 300 characters) that assumes they are busy, not ignoring me\n4. A thank-you text for after they leave the review\n\nDetails: client name [NAME], they were the [BUYER/SELLER], property area [AREA], one memorable moment from the deal: [DETAIL].\n\nRules: never offer or hint at any reward, discount, or gift for the review. Do not tell them what to write or ask for \"5 stars.\" Ask for honest feedback about their experience. Sound like a human, not a campaign.\n```\n\n**Full Build API prompt (paste into the n8n HTTP node body, fields injected)**\n\n```\nYou are the post-closing assistant for {{agent_name}}, a real estate agent with {{brokerage}}. A deal just closed. Generate all post-closing copy.\n\nClient: {{first_name}} {{last_name}}\nSide: {{deal_side}}\nProperty area: {{property_area}}\nClosing date: {{closing_date}}\nPersonal detail: {{personal_detail}}\nGoogle review link: {{review_link}}\n\nReturn ONLY valid JSON, no markdown fences, with exactly these keys:\n{\n  \"caption\": \"Just Closed social caption per the rules below\",\n  \"review_sms\": \"under 320 chars, ends with the review link\",\n  \"review_email_subject\": \"short, personal\",\n  \"review_email_body\": \"90-120 words, ends with the review link\",\n  \"nudge_sms\": \"under 300 chars, polite 7-day follow-up\"\n}\n\nCaption rules: 3 short paragraphs, celebrate the client, no price or full address, soft DM invite, 5 hashtags (2 local to {{property_area}}, 2 real estate, 1 branded: {{branded_hashtag}}).\nReview rules: never offer any incentive, never ask for 5 stars or dictate content, ask for honest feedback, reference the personal detail once.\nGlobal rules: no em dashes anywhere. Warm, human, specific.\n```\n\n**HTML Just Closed template (Full Build, graphic path, 1080x1080)**\n\nSave as `just-closed.html` on your site. Call it with `?address=1234%20Oak%20Ln&photo=https://.../hero.jpg`, screenshot at 1080x1080.\n\n```html\n<div id=\"card\" style=\"width:1080px;height:1080px;position:relative;\n  font-family:'Manrope',sans-serif;overflow:hidden;background:#111;\">\n  <img id=\"photo\" style=\"
