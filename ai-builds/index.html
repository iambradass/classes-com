width:100%;height:72%;object-fit:cover;\" src=\"\">\n  <div style=\"position:absolute;bottom:0;width:100%;height:32%;\n    background:linear-gradient(transparent,#111 40%);\"><\/div>\n  <div style=\"position:absolute;bottom:48px;left:64px;right:64px;color:#fff;\">\n    <div style=\"font-size:64px;font-weight:800;letter-spacing:.06em;\n      color:#c9a227;\">JUST CLOSED<\/div>\n    <div id=\"address\" style=\"font-size:40px;margin-top:8px;\"><\/div>\n    <div style=\"font-size:26px;margin-top:16px;opacity:.85;\">\n      AGENT NAME | BROKERAGE NAME AS REGISTERED WITH TREC<\/div>\n  <\/div>\n<\/div>\n<script>\n  const p = new URLSearchParams(location.search);\n  document.getElementById('address').textContent = p.get('address') || '';\n  document.getElementById('photo').src = p.get('photo') || '';\n<\/script>\n```\n\nSwap the gold (#c9a227), font, and footer line for your brand once; every closing after that is just a URL.\n\n**Review SMS template (GHL, using custom values)**\n\n```\nHi {{contact.first_name}}, congrats again on closing on your home! It was an honor to be part of it. If you have 2 minutes, an honest Google review about your experience would mean the world to me and helps other families find help too: [REVIEW LINK] - {{user.first_name}}\n```\n\n**7-day nudge SMS**\n\n```\nHi {{contact.first_name}}, hope the first week in the new place has been great! No pressure at all, but if you get a spare minute, that Google review would still mean a lot: [REVIEW LINK] Thank you! - {{user.first_name}}\n```\n\n**Review email**\n\n```\nSubject: One small favor, {{contact.first_name}}?\n\nHi {{contact.first_name}},\n\nCongratulations again on closing! Helping you through this one, especially [PERSONAL DETAIL], is exactly why I do this job.\n\nI have one small ask. Most of my business comes from people researching agents online, and honest reviews from real clients are what they trust. If you have two minutes, would you share your experience on Google?\n\n[REVIEW LINK]\n\nWhatever you write, thank you for trusting me with this move. I am here whenever you, or anyone you know, needs anything house-related.\n\n[AGENT NAME]\n[BROKERAGE] | [PHONE]\n```\n\n## 8. What It Costs\n\n**Starter**\n\n| Item | Startup | Monthly |\n|---|---|---|\n| Canva Free + template setup | $0 | $0 |\n| Claude Pro or ChatGPT Plus (optional, free tiers work) | $0 | $0-20 |\n| Google Business Profile | $0 | $0 |\n| **Total** | **$0** | **$0-20** |\n\n**Full Build**\n\n| Item | Startup | Monthly |\n|---|---|---|\n| GoHighLevel | $0 | $97 (Starter plan; $297 Unlimited if you need API access on your own account) |\n| n8n self-hosted on Hostinger VPS | ~1 hr setup | $5-10 (n8n Cloud approx. $24; Make approx. $9-10; Zapier approx. $20+) |\n| Claude API | $5 initial credit | ~$1-3 (assumes 5 closings/mo, ~2,500 input + 1,000 output tokens each on Sonnet at $3/$15 per million tokens; realistically under $1) |\n| Canva Pro (optional, brand kit + resize) | $0 | $0-15 |\n| GHL SMS/email usage | $0 | ~$2-5 (A2P registration ~$20 one-time, ~$2/mo campaign fee, SMS ~$0.008/segment) |\n| **Total** | **~$25** | **~$110-160** |\n\nIf your brokerage already pays for kvCORE/BoldTrail or FUB, swap GHL out and the Full Build runs at roughly $10-40/mo on top of what you already have.\n\n## 9. Compliance & Gotchas\n\n- **Google review policy: zero incentives.** No gift cards, no closing-gift-for-review, no raffle entries. Incentivized reviews violate Google's policy and can nuke your whole profile. Also never \"review gate\" (only asking happy clients); ask everyone.\n- **Texas agents: TREC advertising rules apply to the graphic.** Your Just Closed post is an advertisement. It needs your license-holder name and your brokerage name as registered with TREC, and it cannot imply you are the broker if you are not. Build these into the template once so every post inherits them. Non-Texas agents: your state has an equivalent rule; check it.\n- **Client permission before posting.** Get a yes (text is fine, saved to the CRM) before putting clients' names or faces on social. Some buyers do not want the world knowing they moved. Never post the purchase price or full street address without explicit permission; area or neighborhood is enough.\n- **Fair housing.** Keep captions about the client and the milestone, not about who \"belongs\" in the neighborhood. No language about the area being \"perfect for families,\" \"safe,\" or demographically anything. The AI prompt above avoids this, but you are the last line of review.\n- **A2P 10DLC for SMS.** Any automated text from GHL or another CRM requires A2P brand and campaign registration (roughly $20 one-time plus ~$2/mo through GHL). Unregistered traffic gets filtered or blocked. Your review texts must also honor opt-outs instantly; GHL handles STOP automatically, but never re-add an opted-out contact to the sequence.\n- **MLS rules on photos.** You can use your own listing photos. If you were the buyer's agent, the listing photos belong to the listing brokerage/photographer; use your own closing-day photo or a no-photo branded layout instead.\n- **Human review is mandatory at two points:** the graphic + caption before it posts (AI occasionally invents details or picks a tone-deaf angle), and any client with a rocky transaction, where you should skip or delay the review ask entirely. The approval step in the Full Build exists on purpose; do not remove it.\n- **Data privacy.** Client names, phones, and personal details are flowing through your automation stack and an AI API. Use your own accounts, not shared logins, do not paste sensitive financials into prompts, and delete test contacts when done.\n"}, {"id": "b10", "file": "10-fair-housing-compliance-linter.md", "nav": "Compliance Linter", "group": "builds", "num": "10", "diff": "Easy", "lvl": 1, "starter": "$0-20", "full": "$10-25", "line": "Checks every listing description, post, ad, and farm mailer for fair housing, TREC, and MLS violations before anything publishes.", "md": "# The Fair Housing + Advertising Compliance Linter\n\nEvery piece of marketing copy gets an AI compliance check before it publishes, so you never learn about a fair housing problem from a complaint.\n\n## 1. What It Is\n\nThis is a checkpoint that reads your marketing copy before anyone else sees it. You paste in a listing description, a social post, an ad, or a mailer, and the AI checks it against the rules that get agents in trouble: fair housing language, discriminatory targeting, state license-law advertising requirements (broker name, license disclosure), MLS remarks rules, and claims that cross the line from salesmanship into misrepresentation. It hands back a simple verdict: PASS or FAIL, a list of every risky phrase, a plain-English reason each one is risky, and a rewritten version you can publish instead.\n\nThink of it as spell-check, but for the sentences that can cost you your license. In the Starter version, it is a saved prompt you run in Claude or ChatGPT before you post anything. In the Full Build, it becomes an automated gate wired into your content pipeline: nothing publishes until it passes the check, and your whole team gets a shared checker page.\n\n## 2. Why You Need It\n\nFair housing complaints are not rare and they are not cheap. Federal Fair Housing Act violations can run into five figures per violation before attorney fees, TREC advertising violations carry fines and license discipline, and MLS rule violations commonly run $500-5,000 per offense. One phrase like \"perfect for young families\" in a listing description is enough to trigger a complaint, and AI writing tools generate exactly that kind of language constantly. If your team uses AI to write marketing copy (and it does), this linter is the objection-killer that lets your broker say yes to it: every AI-written word passes through a compliance gate before it goes live.\n\nThere is also a business upside. A manual broker review of every social post takes 5-10 minutes per piece and creates a bottleneck nobody respects for long. The linter runs in under 30 seconds, catches the 95% of issues that are pattern-matchable, and leaves the broker reviewing only flagged items. For a team posting 10-15 pieces of content a week, that is 1-2 hours of review time saved weekly, plus a written audit trail showing every piece was checked, which is exactly what you want on file if a complaint ever lands. If you sell or teach at the brokerage level, this is the single build that converts skeptical compliance-minded brokers into AI adopters.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| Claude Pro | Runs the Starter compliance check as a Claude Project | $20/mo | ChatGPT Plus ($20/mo) as a Custom GPT; free tiers of either work for low volume |\n| Claude API | Powers the automated gate in the Full Build (pay per use) | approx. $5-15/mo at 300 checks | OpenAI API works the same way; a chat subscription cannot be automated, so the API is required for the Full Build |\n| n8n (self-hosted) | The automation engine that receives copy, calls the AI, and blocks or passes it | Free software + $5-10/mo VPS (Hostinger) | n8n Cloud (approx. $26/mo), Make (free tier, then approx. $10/mo), Zapier (free 100 tasks, then $19.99/mo) |\n| GoHighLevel | Where content submissions come from and where approved posts get scheduled | $97/mo Starter, $297/mo Unlimited | Follow Up Boss, kvCORE/BoldTrail (often brokerage-provided), Lofty, or no CRM at all: the checker page works standalone |\n| Static hosting | Hosts the team-wide checker page | $0 (Vercel) or existing Hostinger plan | Canva Sites or a GHL funnel page can host the form; already have a website? Add it as a page there |\n| Your state rules | The license-law layer of the prompt (TREC in this guide) | Free | Every state publishes advertising rules; swap the TREC section of the prompt for yours |\n\nCheapest possible path: $0. Use the free tier of Claude or ChatGPT with the Section 7 prompt pasted in manually before every post. You lose the automation and the shared page, but the compliance logic is identical.\n\n## 4. How It Works\n\n1. Copy comes in. An agent submits marketing copy through a GHL form, the team checker page, or by pasting it into the chat tool (Starter).\n2. The copy plus its context (content type, platform, state) is sent to Claude with a detailed compliance system prompt covering fair housing, TREC advertising rules, MLS remarks rules, and misrepresentation risk.\n3. Claude returns a structured verdict: PASS, FAIL, or REVIEW, with every flagged phrase, the rule category it trips, why it is risky, and a compliant rewrite.\n4. In the Full Build, an IF step in n8n reads the verdict. PASS flows forward to publishing (GHL Social Planner, email, print). FAIL stops the pipeline and sends the flags and rewrites back to the agent.\n5. Every check is logged (n8n execution history or a Google Sheet), giving the broker an audit trail.\n\nWhy this architecture: the AI never publishes anything itself. It is a gate, not an author, so a false negative can never post on its own; a human still pushes the final button on anything flagged, and the broker keeps final authority. That separation is what makes this defensible to a compliance-minded brokerage.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\n1. Open claude.ai and sign in (free account works; Pro removes usage limits).\n2. In the left sidebar, click Projects, then New Project. Name it \"Compliance Check\".\n3. Click \"Set project instructions\" (or the instructions field in project settings) and paste the full Compliance Linter Prompt from Section 7. Save.\n4. Optional but recommended: click \"Add content\" in the project knowledge panel and upload your brokerage's advertising policy and your state's advertising rules. For Texas, download the advertising rules page from trec.texas.gov (the rules under 22 TAC 535.154 and 535.155) as a PDF and upload it. Claude will cite your actual documents.\n5. Test it. Open a new chat inside the project and paste this deliberately bad description: \"Stunning home in a safe, exclusive neighborhood, walking distance to St. Mark's church. Perfect for young families! Brand new roof. Call Sarah at 555-1234!\" You should get a FAIL with flags on \"safe\", \"exclusive\", \"walking distance to St. Mark's church\", \"perfect for young families\", the unverified \"brand new roof\" claim, and the missing broker name.\n6. Make it a habit: every listing description, social caption, ad, and mailer gets pasted into this project before it publishes. The check takes under 30 seconds.\n7. ChatGPT equivalent: create a Custom GPT (Explore GPTs, then Create), paste the same Section 7 prompt into Instructions, upload the same PDFs to Knowledge, and share the GPT link with your team.\n8. Team sharing without automation: on a Claude Team plan you can share the Project with teammates. On individual plans, put the Section 7 prompt in a shared Google Doc titled \"Run this before you post\" and have each agent paste it into their own chat tool.\n\nThat is the whole Starter build. It is genuinely done at this point; everything below is automation on top of the same prompt.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nAssumes a working n8n instance (self-hosted on a Hostinger VPS or n8n Cloud) and optionally a GHL sub-account. Zapier/Make equivalents are noted per step.\n\n1. Get an Anthropic API key. Go to platform.claude.com, sign in, open API Keys, click Create Key, and copy it. Add $5-10 of credit under Billing. (Zapier/Make: same key works in their Anthropic modules, or use raw webhook/HTTP modules exactly as below.)\n2. In n8n, create a new workflow named \"Compliance Gate\".\n3. Add a Webhook node. Set HTTP Method to POST, Path to `compliance-check`, and Respond to \"Using 'Respond to Webhook' Node\". After you save and activate the workflow, copy the Production URL; it looks like `https://your-n8n-domain/webhook/compliance-check`. This URL is what every form and page will POST to. Expected incoming JSON body: `{\"copy\": \"...\", \"content_type\": \"listing|social|ad|mailer\", \"platform\": \"instagram|facebook|mls|print\", \"agent_email\": \"...\"}`. (Zapier: Webhooks by Zapier, Catch Hook. Make: Custom Webhook module.)\n4. Add an HTTP Request node named \"Claude Check\" connected to the Webhook node:\n   - Method: POST\n   - URL: `https://api.anthropic.com/v1/messages`\n   - Authentication: Generic Credential Type, Header Auth. Create a credential with Name `x-api-key` and Value your API key. Storing the key as a credential keeps it out of the workflow JSON.\n   - Headers: add `anthropic-version` = `2023-06-01` and `content-type` = `application/json`.\n   - Body: JSON, \"Using JSON\", paste the request body from Section 7 (it references the incoming fields with n8n expressions like `{{ $json.body.copy }}`).\n   (Zapier: the Anthropic app's \"Send Message\" action, or Webhooks by Zapier POST with the same URL, headers, and body. Make: HTTP \"Make a request\" module, same settings.)\n5. Add a Code node named \"Parse Verdict\" after Claude Check, with this JavaScript:\n   ```javascript\n   const raw = $json.content[0].text;\n   const verdict = JSON.parse(raw);\n   verdict.agent_email = $('Webhook').first().json.body.agent_email || '';\n   verdict.original_copy = $('Webhook').first().json.body.copy;\n   return [{ json: verdict }];\n   ```\n   The request body in Section 7 uses a JSON schema output format, so `content[0].text` is guaranteed to be valid JSON. (Zapier: Formatter or Code by Zapier step doing the same JSON.parse. Make: parse JSON module.)\n6. Add an IF node: condition String, Value 1 `{{ $json.status }}`, Operation \"equals\", Value 2 `PASS`.\n7. PASS branch: add a Respond to Webhook node returning `{{ JSON.stringify($json) }}` with Response Code 200. Optionally chain a GHL step here to auto-schedule: an HTTP Request to the GHL Social Planner API, or simpler, an email to the agent saying \"Approved, go post it.\" (Zapier: Paths, Path A continues to your publish step. Make: Router.)\n8. FAIL/REVIEW branch: add a second Respond to Webhook node returning the same JSON (the checker page renders the flags), then an email node (Resend, SMTP, or a GHL workflow webhook) that sends the agent their flagged phrases and the compliant rewrite. Subject: \"Compliance check: revise before posting\". Nothing on this branch connects to any publish step; that is the gate.\n9. Optional logging: add a Google Sheets \"Append Row\" node after Parse Verdict (both branches) writing timestamp, agent_email, content_type, status, and flag count. This sheet is your broker's audit trail.\n10. Wire GHL in: in your GHL sub-account, build a form named \"Content Submission\" with fields Copy (long text), Content Type (dropdown), Platform (dropdown), and Email. Create a workflow with trigger \"Form Submitted\" on that form, and add the action \"Custom Webhook\": Method POST, URL your n8n production URL from step 3, and map the form fields into the JSON body keys `copy`, `content_type`, `platform`, `agent_email`. Agents now submit content from inside the CRM they already use. (Zapier: GHL or your CRM's native Zapier trigger into the Catch Hook Zap. Make: same via the CRM module or webhook.)\n11. Team checker page: create a simple page (static HTML on Hostinger/Vercel, a Canva Site with an embed, or a GHL funnel page with a custom HTML block) containing a textarea, two dropdowns, and a Check button that POSTs to the webhook and renders the JSON response. The minimal JavaScript is in Section 7. One required setting or the browser will block the request: on the n8n Webhook node, open Options, add \"Allowed Origins (CORS)\", and enter your checker page's domain (for example `https://yourteamsite.com`). Without it the page shows a network error even though the workflow is fine. Now anyone on the team, including agents who will never open n8n, can self-check copy in 30 seconds.\n12. Test end to end with the bad copy from Starter step 5 and with a clean piece. Verify PASS reaches the publish/notify step, FAIL does not, and both write to the log sheet.\n\n## 7. Prompts & Templates\n\n### The Compliance Linter Prompt (Starter project instructions AND the Full Build system prompt)\n\n```\nYou are a real estate advertising compliance reviewer for a Texas brokerage.\nReview every piece of marketing copy I give you BEFORE it is published.\nCheck the copy against ALL of the following rule sets:\n\n1. FEDERAL FAIR HOUSING (FHA). Flag any language that states or implies a\n   preference, limitation, or discrimination based on race, color, religion,\n   sex, national origin, familial status, or disability. Also flag common\n   proxy/steering language, including but not limited to:\n   - Household-type language: \"perfect for families\", \"ideal for young\n     professionals\", \"empty nesters\", \"bachelor pad\", \"adult community\"\n     (unless a documented 55+ HOPA community), \"no kids\".\n   - Religious or ethnic proxies: named churches/temples/mosques as amenities\n     (\"walking distance to St. Mark's\"), \"ethnic neighborhood\", holiday\n     language that implies a preferred buyer religion.\n   - Coded neighborhood language: \"safe\", \"exclusive\", \"desirable people\",\n     \"low crime\", \"changing neighborhood\", \"traditional neighborhood\".\n   - Disability language: \"no wheelchairs\", \"able-bodied\", \"not suitable\n     for handicapped\", or discouraging assistance animals.\n   - School-quality proxies: \"great schools\" used as a buyer filter. Naming\n     a school district factually is acceptable; ranking or praising schools\n     as a reason to buy is a flag.\n   - Source-of-income exclusions: \"no Section 8\", \"no vouchers\" (also flag\n     as illegal in jurisdictions with source-of-income protection).\n   Describe the PROPERTY, not the ideal buyer. Any sentence describing who\n   should live there is a flag.\n\n2. DISCRIMINATORY TARGETING (for ads). If the copy is a paid ad, note that\n   housing ads on Meta/Google are a Special Ad Category: no targeting by\n   age, gender, zip code radius under 15 miles, or interest categories that\n   proxy for protected classes. Flag copy that only makes sense with\n   discriminatory targeting (\"ad for young couples in [zip]\").\n\n3. TEXAS LICENSE LAW (TREC, 22 TAC 535.154 and 535.155) as the worked\n   example; apply the equivalent rule for other states if told the state.\n   Every advertisement (including social posts promoting brokerage services)\n   must:\n   - Include the license holder's name or registered team name AND the\n     broker's name as registered with TREC. The broker's name must be at\n     least half the size of the largest contact information or team/agent\n     name in the ad.\n   - Not be misleading or likely to deceive the public.\n   - Not imply the agent is the broker or the only source of the listing.\n   - Team names must comply with TREC team-name rules (must contain \"team\"\n     or \"group\"; must not imply a separate brokerage).\n   Flag any ad missing the broker name. Flag \"Realtor\" used by a non-member\n   if that is indicated.\n\n4. MLS PUBLIC REMARKS RULES. If content_type is an MLS listing description:\n   - No agent/office names, phone numbers, emails, or URLs in public remarks.\n   - No showing instructions, lockbox codes, or alarm codes.\n   - No compensation or commission information anywhere in the MLS.\n   - No gate codes or occupancy details that create a safety risk.\n\n5. PUFFERY VS MISREPRESENTATION. Puffery (unmeasurable opinion: \"stunning\",\n   \"charming\", \"best views in town\") is acceptable; do not flag it.\n   Flag MEASURABLE factual claims that are unverified or absolute:\n   - \"New roof / new HVAC\" (require year or \"per seller\" attribution),\n   - square footage or lot size without a source (\"per appraisal district\"),\n   - \"no flooding\", \"never flooded\", \"no foundation issues\" (require\n     disclosure-safe phrasing),\n   - guaranteed outcomes: \"will appreciate\", \"guaranteed rental income\",\n   - \"largest/cheapest/only\" claims that can be factually wrong.\n\nOUTPUT FORMAT. Always respond with exactly this JSON structure and nothing\nelse (no markdown, no commentary outside the JSON):\n{\n  \"status\": \"PASS\" | \"FAIL\" | \"REVIEW\",\n  \"flags\": [\n    {\n      \"phrase\": \"the exact flagged text\",\n      \"category\": \"fair_housing\" | \"targeting\" | \"license_law\" | \"mls\" | \"misrepresentation\",\n      \"risk\": \"high\" | \"medium\" | \"low\",\n      \"why\": \"one plain-English sentence explaining the risk\",\n      \"rewrite\": \"a compliant replacement phrase, or REMOVE if it cannot be fixed\"\n    }\n  ],\n  \"compliant_rewrite\": \"the full copy rewritten to pass, preserving the original voice and energy\",\n  \"summary\": \"one sentence a busy agent will actually read\"\n}\n\nRULES OF JUDGMENT:\n- status is FAIL if any high-risk flag exists, REVIEW if only medium/low\n  flags exist, PASS only if there are zero flags.\n- Never soften a fair housing flag to REVIEW; protected-class implications\n  are always FAIL.\n- A missing broker name on an advertisement is always FAIL.\n- Do not invent facts in rewrites. If a claim cannot be verified, attribute\n  it (\"per seller\") or remove it.\n- Preserve the marketing energy. Your rewrites should sell the property as\n  hard as the original, just legally.\n- You are a screening tool, not an attorney. If something is genuinely\n  ambiguous, flag it as REVIEW and say why, so a human broker decides.\n```\n\n### n8n HTTP Request body (step 4 of the Full Build)\n\nPaste as the JSON body of the \"Claude Check\" node. Replace `PASTE THE FULL COMPLIANCE LINTER PROMPT HERE` with the entire prompt above (escaped as a single JSON string; n8n's expression editor handles multiline strings if you build it with an expression).\n\n```json\n{\n  \"model\": \"claude-opus-4-8\",\n  \"max_tokens\": 2048,\n  \"system\": \"PASTE THE FULL COMPLIANCE LINTER PROMPT HERE\",\n  \"output_config\": {\n    \"format\": {\n      \"type\": \"json_schema\",\n      \"schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n          \"status\": { \"type\": \"string\", \"enum\": [\"PASS\", \"FAIL\", \"REVIEW\"] },\n          \"flags\": {\n            \"type\": \"array\",\n            \"items\": {\n              \"type\": \"object\",\n              \"properties\": {\n                \"phrase\": { \"type\": \"string\" },\n                \"category\": { \"type\": \"string\", \"enum\": [\"fair_housing\", \"targeting\", \"license_law\", \"mls\", \"misrepresentation\"] },\n                \"risk\": { \"type\": \"string\", \"enum\": [\"high\", \"medium\", \"low\"] },\n                \"why\": { \"type\": \"string\" },\n                \"rewrite\": { \"type\": \"string\" }\n              },\n              \"required\": [\"phrase\", \"category\", \"risk\", \"why\", \"rewrite\"],\n              \"additionalProperties\": false\n            }\n          },\n          \"compliant_rewrite\": { \"type\": \"string\" },\n          \"summary\": { \"type\": \"string\" }\n        },\n        \"required\": [\"status\", \"flags\", \"compliant_rewrite\", \"summary\"],\n        \"additionalProperties\": false\n      }\n    }\n  },\n  \"messages\": [\n    {\n      \"role\": \"user\",\n      \"content\": \"Content type: {{ $json.body.content_type }}\\nPlatform: {{ $json.body.platform }}\\nState: Texas\\n\\nCopy to review:\\n{{ $json.body.copy }}\"\n    }\n  ]\n}\n```\n\nThe `output_config.format` block forces the API to return valid JSON matching the schema, which is why the Parse Verdict code node can call `JSON.parse` without defensive handling.\n\n### Checker page JavaScript (step 11)\n\nDrop into any HTML page with `<textarea id=\"copy\">`, `<select id=\"ctype\">`, `<select id=\"platform\">`, a button, and `<div id=\"result\">`:\n\n```html\n<script>\nasync function checkCopy() {\n  const res = await fetch('https://YOUR-N8N-DOMAIN/webhook/compliance-check', {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({\n      copy: document.getElementById('copy').value,\n      content_type: document.getElementById('ctype').value,\n      platform: document.getElementById('platform').value,\n      agent_email: ''\n    })\n  });\n  const v = await res.json();\n  const flags = v.flags.map(f =>\n    '<li><b>' + f.phrase + '<\/b> (' + f.category + ', ' + f.risk + '): ' +\n    f.why + '<br>Try: <i>' + f.rewrite + '<\/i><\/li>').join('');\n  document.getElementById('result').innerHTML =\n    '<h2>' + v.status + '<\/h2><p>' + v.summary + '<\/p><ul>' + flags +\n    '<\/ul><h3>Compliant version<\/h3><p>' + v.compliant_rewrite + '<\/p>';\n}\n<\/script>\n```\n\n### Fail-notice email template (step 8)\n\n```\nSubject: Compliance check: revise before posting\n\nYour submitted copy did not pass the compliance check.\n\nStatus: {{status}}\n{{summary}}\n\nFlagged phrases:\n{{flags list}}\n\nA compliant rewrite is below. Review it, adjust the voice if needed, and\nresubmit. Questions on any flag? Forward this to the broker.\n\n{{compliant_rewrite}}\n```\n\n## 8. What It Costs\n\nVerified July 2026. Claude Pro and ChatGPT Plus are $20/mo. Claude API Opus-tier pricing is $5 per million input tokens and $25 per million output tokens. GHL is $97/$297. Zapier paid plans start at $19.99/mo (annual). n8n Cloud starts at approx. $26/mo; self-hosted n8n is free software on a $5-10/mo Hostinger VPS.\n\n### Starter\n\n| Item | Startup | Monthly |\n|---|---|---|\n| Claude Pro or ChatGPT Plus | $0 | $0-20 (free tiers work for a few checks a day) |\n| Your time | ~45 min | ~30 sec per check |\n| Total | $0 | $0-20 |\n\n### Full Build\n\n| Item | Startup | Monthly |\n|---|---|---|\n| n8n self-hosted on VPS | ~1 hr if VPS exists | $5-10 (skip if you already run n8n) |\n| Claude API usage | $5 initial credit | approx. $5-15 |\n| GHL (only if you do not have it) | $0 | $97 (Starter plan; most teams already pay this) |\n| Checker page hosting | ~30 min | $0 (Vercel free or existing hosting) |\n| Total (already have GHL + VPS) | ~3-4 hrs build time | $10-25 |\n| Total (starting from nothing) | ~4-6 hrs | $110-125 |\n\nAPI usage assumption: 300 checks/month, each roughly 2,000 input tokens (prompt + copy) and 700 output tokens on `claude-opus-4-8`: about $0.03 per check, roughly $8-9/month. Double the volume and it is still under $20. Zapier instead of n8n: $0 on the free tier up to 100 checks/month, $19.99/mo beyond that.\n\n## 9. Compliance & Gotchas\n\n- This is a screening tool, not legal advice, and it does not replace broker supervision. Put that sentence in writing wherever you deploy it. TREC holds the broker responsible for advertising regardless of what tools the team uses.\n- A human must review every FAIL and REVIEW before publishing, and the broker should spot-check PASSes weekly. AI misses things and occasionally over-flags; the audit log makes both visible.\n- Fair housing goes beyond the federal seven classes. Many states and cities add source of income, sexual orientation, gender identity, age, and marital status. Add your local protections to the prompt; the Texas example is a floor, not a ceiling.\n- TREC specifics change. Verify the current text of 22 TAC 535.154 and 535.155 (team names, broker-name size requirement, \"advertisement\" definition covering social media) about twice a year and update the prompt. Other states: swap this section entirely.\n- MLS rules are local. Public-remarks rules differ by MLS, and post-NAR-settlement, compensation cannot appear in the MLS at all. Paste your MLS's actual rules into the prompt or project knowledge.\n- Meta/Google housing ads are a Special Ad Category with restricted targeting. The linter flags copy, but targeting settings live in the ad platform; checking the copy does not make an illegally targeted ad legal.\n- Do not paste client personal information (names, financial details) into consumer AI tools. The linter needs the marketing copy only. On the API, review Anthropic's data handling terms and your brokerage's vendor policy.\n- If the FAIL branch sends SMS instead of email, your sending number must be A2P 10DLC registered (GHL handles registration in-platform, but it must be done).\n- Keep a test suite: 5-10 known-bad and known-good samples. Rerun them after any prompt edit or model update, since model behavior shifts between versions.\n- Log everything. n8n execution history plus the Google Sheet is your evidence of a compliance process, which matters for E&O and for TREC audits.\n- The webhook URL is public and unauthenticated; anyone who has it can run checks and spend your API credits. Do not post it publicly. For a team of any size, add a shared-secret header check (an IF node comparing a custom header value) or put the checker page behind your site's existing login.\n- The linter cannot verify facts. \"New roof 2024\" passes as properly attributed language even if the roof is from 2009; truthfulness is still the agent's job.\n"}];

  for(const [re,d] of TOOL_MATCH){ if(re.test(title) && TOOL_LOGOS[d]) return '<img class="tlogo" alt="" src="data:image/png;base64,'+TOOL_LOGOS[d]+'">'; }

const SECTION_SHORT = [
  [/what it is/i,'What'],[/why you need/i,'Why'],[/you'?ll need/i,'Tools'],
  [/how it works/i,'How'],[/starter/i,'Starter'],[/full build/i,'Full Build'],
  [/prompts/i,'Prompts'],[/what it costs|costs?$/i,'Costs'],[/compliance/i,'Compliance'],[/teach/i,'Teach'],
];
function shortLabel(t){ for(const [re,s] of SECTION_SHORT){ if(re.test(t)) return s; } return t.replace(/^\d+\.\s*/,'').split(' ').slice(0,2).join(' '); }
function meter(lvl){ return '<span class="meter l'+lvl+'" aria-hidden="true"><i></i><i></i><i></i></span>'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function go(id){
  try{ if(('#'+id)!==location.hash) location.hash = id; }catch(e){}
  render(id);
}

/* ---------- toc ---------- */
function buildToc(){
  const front=document.getElementById('tocFront'), builds=document.getElementById('tocBuilds');
  let f='', b='';
  for(const d of DOCS){
    const num = d.num ? d.num : '&sect;';
    const cost = d.starter ? '<span class="toc-cost">'+d.starter+'</span>' : '';
    const row = '<button class="toc-item" data-id="'+d.id+'"><span class="toc-num">'+num+'</span><span class="toc-title">'+d.nav+'</span>'+cost+'</button>';
    if(d.group==='front') f+=row; else b+=row;
  }
  front.innerHTML=f; builds.innerHTML=b;
  document.querySelectorAll('.toc-item').forEach(el=>el.addEventListener('click',()=>{ go(el.dataset.id); closeNav(); }));
}

/* ---------- shared content dressing ---------- */
function dressCommon(root){
  root.querySelectorAll('table').forEach(t=>{
    if(t.closest('.tablewrap')) return;
    const w=document.createElement('div'); w.className='tablewrap';
    t.parentNode.insertBefore(w,t); w.appendChild(t);
  });
  root.querySelectorAll('pre').forEach(pre=>{
    if(pre.closest('.specimen')) return;
    const box=document.createElement('div'); box.className='specimen';
    const bar=document.createElement('div'); bar.className='bar';
    bar.innerHTML='<span class="lbl">Copy-paste block</span>';
    const btn=document.createElement('button'); btn.textContent='Copy';
    btn.addEventListener('click',()=>{
      const done=()=>{ btn.textContent='Copied'; setTimeout(()=>btn.textContent='Copy',1600); };
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(pre.innerText).then(done).catch(done); } else done();
    });
    bar.appendChild(btn);
    pre.parentNode.insertBefore(box,pre); box.appendChild(bar); box.appendChild(pre);
  });
}

/* ---------- guide sections ---------- */
function parseGuide(d){
  const tmp=document.createElement('div');
  tmp.innerHTML = marked.parse(d.md);
  const nodes=[...tmp.children];
  const intro=[]; const sections=[];
  let cur=null;
  for(const n of nodes){
    if(n.tagName==='H1') continue;
    if(n.tagName==='H2'){
      const m=n.textContent.match(/^(\d+)\.\s*(.*)$/);
      cur={num:m?m[1]:String(sections.length+1), title:m?m[2]:n.textContent, label:shortLabel(n.textContent), nodes:[]};
      sections.push(cur); continue;
    }
    (cur?cur.nodes:intro).push(n);
  }
  return {intro, sections};
}

function ckey(gid,label,i){ return 'pb1.'+gid+'.'+label+'.'+i; }

const GROUPS_DEF = [
  {label:'Overview', secs:[1,2]},
  {label:'How It Works', secs:[4]},
  {label:'Tools & Costs', secs:[3,8]},
  {label:'Starter Setup', secs:[5]},
  {label:'Full Build', secs:[6]},
  {label:'Prompts', secs:[7]},
  {label:'Compliance', secs:[9]},
];
if(!CLIENT) GROUPS_DEF.push({label:'Teach It', secs:[10]});

function buildTabs(sections){
  const byNum={}; sections.forEach(sec=>{ byNum[parseInt(sec.num,10)]=sec; });
  const tabs=[]; const orig2tab={};
  GROUPS_DEF.forEach(g=>{
    const parts=g.secs.map(n=>byNum[n]).filter(Boolean);
    if(!parts.length) return;
    const ti=tabs.length;
    g.secs.forEach(n=>{ if(byNum[n]) orig2tab[n]=ti; });
    tabs.push({label:g.label, parts});
  });
  return {tabs, orig2tab};
}

function transformPane(pane, sec, d){
  const L=sec.label;
  if(L==='Tools'){
    const tbl=pane.querySelector('table');
    if(tbl){
      const rows=[...tbl.querySelectorAll('tbody tr, tr')].filter(r=>r.querySelector('td'));
      const grid=document.createElement('div'); grid.className='toolgrid';
      rows.forEach(r=>{
        const c=[...r.children].map(td=>td.innerHTML);
        if(c.length<2) return;
        const card=document.createElement('div'); card.className='tool';
        const plainTitle=(r.children[0]?r.children[0].textContent:'');
        card.innerHTML='<div class="th">'+toolLogo(plainTitle)+'<div class="tn">'+c[0]+'</div><div class="tp">'+(c[2]||'')+'</div></div>'+
          '<div class="tr">'+(c[1]||'')+'</div>'+
          (c[3]?'<div class="ta"><b>Alternatives</b><br>'+c[3]+'</div>':'');
        grid.appendChild(card);
      });
      const wrap=tbl.closest('.tablewrap')||tbl;
      wrap.parentNode.replaceChild(grid,wrap);
    }
  }
  if(L==='How'){
    const ol=pane.querySelector(':scope > ol, :scope ol');
    if(ol && !ol.closest('li')){
      const flow=document.createElement('div'); flow.className='flow';
      [...ol.children].forEach((li,i)=>{
        const st=document.createElement('div'); st.className='fstep';
        st.innerHTML='<div class="fn">'+(i+1)+'</div>';
        const fb=document.createElement('div'); fb.className='fb'; fb.innerHTML=li.innerHTML;
        st.appendChild(fb); flow.appendChild(st);
      });
      ol.parentNode.replaceChild(flow,ol);
    }
  }
  if(L==='Starter'||L==='Full Build'){
    let idx=0; const items=[];
    pane.querySelectorAll(':scope ol').forEach(ol=>{
      if(ol.closest('li')||ol.closest('.check')) return;
      const chk=document.createElement('div'); chk.className='check';
      [...ol.children].forEach(li=>{
        const i=idx++;
        const it=document.createElement('div'); it.className='citem'; it.setAttribute('role','checkbox'); it.tabIndex=0;
        const on=store.getItem(ckey(d.id,L,i))==='1';
        if(on) it.classList.add('done');
        it.setAttribute('aria-checked', on?'true':'false');
        it.innerHTML='<div class="box">&#10003;</div>';
        const ct=document.createElement('div'); ct.className='ct'; ct.innerHTML=li.innerHTML;
        it.appendChild(ct);
        const toggle=()=>{
          const now=!it.classList.contains('done');
          it.classList.toggle('done',now); it.setAttribute('aria-checked',now?'true':'false');
          store.setItem(ckey(d.id,L,i), now?'1':'0');
          updateProgress(pane,d,L); updateTabProg(d);
        };
        it.addEventListener('click',e=>{ if(e.target.closest('a,button,pre,code')) return; toggle(); });
        it.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); toggle(); } });
        chk.appendChild(it); items.push(it);
      });
      ol.parentNode.replaceChild(chk,ol);
    });
    if(items.length){
      const bar=document.createElement('div'); bar.className='cprog'; bar.innerHTML='<i></i>';
      pane.insertBefore(bar, pane.firstChild);
      pane.dataset.items=items.length;
      updateProgress(pane,d,L);
    }
  }
  if(L==='Compliance'){
    pane.querySelectorAll(':scope > ul').forEach(ul=>{
      const w=document.createElement('div'); w.className='warns';
      [...ul.children].forEach(li=>{
        const it=document.createElement('div'); it.className='warn'; it.innerHTML=li.innerHTML;
        w.appendChild(it);
      });
      ul.parentNode.replaceChild(w,ul);
    });
  }
}

function countDone(d,label,n){
  let c=0; for(let i=0;i<n;i++) if(store.getItem(ckey(d.id,label,i))==='1') c++;
  return c;
}
function updateProgress(pane,d,label){
  const n=parseInt(pane.dataset.items||'0'); if(!n) return;
  const c=[...pane.querySelectorAll('.citem')].filter(x=>x.classList.contains('done')).length;
  const bar=pane.querySelector('.cprog i'); if(bar) bar.style.width=(100*c/n)+'%';
  const px=pane.querySelector('.phx-count'); if(px) px.textContent=c+' of '+n+' done';
}
function updateTabProg(d){
  const g=view.querySelector('.tabbar'); if(!g) return;
  g.querySelectorAll('button[data-items]').forEach(b=>{
    const n=parseInt(b.dataset.items); const c=countDone(d,b.dataset.label,n);
    const el=b.querySelector('.tprog'); if(el) el.textContent=c+'/'+n;
    b.classList.toggle('done', n>0&&c===n);
  });
}

function renderGuide(d){
  const {intro, sections}=parseGuide(d);
  const {tabs, orig2tab}=buildTabs(sections);
  const tab = guideTab[d.id]||0;

  let h='<div class="chap"><p class="kicker">Build '+d.num+' of '+NBUILDS+' &middot; '+d.diff+'</p><h1>'+d.nav+'</h1>'+
    '<div class="specrow">'+
    '<div class="spec"><span class="k">Difficulty</span><span class="v">'+meter(d.lvl)+d.diff+'</span></div>'+
    '<div class="spec"><span class="k">Starter</span><span class="v">'+d.starter+'/mo</span></div>'+
    '<div class="spec"><span class="k">Full Build</span><span class="v">'+d.full+'/mo</span></div>'+
    '</div>';
  view.innerHTML=h+'</div>';
  const chap=view.querySelector('.chap');

  if(intro.length){
    const first=intro[0];
    if(first && first.tagName==='P'){ first.classList.add('lede'); }
    intro.forEach(n=>chap.appendChild(n));
  }

  const bar=document.createElement('div'); bar.className='tabbar'; bar.setAttribute('role','tablist');
  tabs.forEach((t,i)=>{
    const b=document.createElement('button'); b.setAttribute('role','tab');
    b.innerHTML='<span class="tnum">'+(i+1)+'</span>'+esc(t.label);
    const chkPart=t.parts.find(pt=>pt.label==='Starter'||pt.label==='Full Build');
    if(chkPart){
      const olItems=(chkPart.nodes.filter(n=>n.tagName==='OL').reduce((a,o)=>a+o.children.length,0));
      if(olItems){ b.dataset.items=olItems; b.dataset.label=chkPart.label;
        b.innerHTML+=' <span class="tprog">'+countDone(d,chkPart.label,olItems)+'/'+olItems+'</span>'; }
    }
    b.addEventListener('click',()=>{ showPane(d,tabs,orig2tab,i,true); });
    bar.appendChild(b);
  });
  view.appendChild(bar);

  const paneHost=document.createElement('div'); paneHost.id='paneHost';
  view.appendChild(paneHost);
  showPane(d,tabs,orig2tab,Math.min(tab,tabs.length-1),false);
  folio.innerHTML='No. '+d.num+' &middot; <b>'+d.nav+'</b>';
}

function showPane(d,tabs,orig2tab,i,scroll){
  guideTab[d.id]=i;
  const t=tabs[i];
  const host=document.getElementById('paneHost');
  const bar=view.querySelector('.tabbar');
  [...bar.children].forEach((b,j)=>{ b.classList.toggle('on',j===i); b.setAttribute('aria-selected', j===i?'true':'false'); });

  const pane=document.createElement('div'); pane.className='pane anim md';
  const head=document.createElement('div'); head.className='pane-head';
  head.innerHTML='<span class="pn">'+(i+1)+'.</span><h2>'+esc(t.label)+'</h2>';
  pane.appendChild(head);

  let chkDiv=null, chkLabel=null;
  t.parts.forEach((part,pi)=>{
    const pd=document.createElement('div'); pd.className='part';
    if(pi>0){
      const dv=document.createElement('div'); dv.className='subdiv'; dv.textContent=part.title;
      pane.appendChild(dv);
    }
    part.nodes.forEach(n=>pd.appendChild(n.cloneNode(true)));
    transformPane(pd,part,d);
    if(pd.dataset.items){ chkDiv=pd; chkLabel=part.label; }
    pane.appendChild(pd);
  });
  dressCommon(pane);

  if(chkDiv){
    const n=parseInt(chkDiv.dataset.items||'0');
    if(n){
      const phx=document.createElement('div'); phx.className='phx';
      phx.innerHTML='<span class="phx-count">'+countDone(d,chkLabel,n)+' of '+n+' done</span> &middot; ';
      const rb=document.createElement('button'); rb.textContent='reset';
      rb.addEventListener('click',()=>{
        for(let k=0;k<n;k++) store.setItem(ckey(d.id,chkLabel,k),'0');
        chkDiv.querySelectorAll('.citem').forEach(x=>{x.classList.remove('done');x.setAttribute('aria-checked','false');});
        updateProgress(chkDiv,d,chkLabel); updateTabProg(d);
      });
      phx.appendChild(rb); head.appendChild(phx);
      updateProgress(chkDiv,d,chkLabel);
    }
  }

  const nav=document.createElement('div'); nav.className='pane-nav';
  const di=DOCS.indexOf(d);
  let lhtml='<span></span>';
  if(i>0) lhtml='<button data-k="p"><span class="d">&larr; Back</span>'+(i)+'. '+esc(tabs[i-1].label)+'</button>';
  let rhtml='';
  if(i<tabs.length-1) rhtml='<button data-k="n"><span class="d">Continue &rarr;</span>'+(i+2)+'. '+esc(tabs[i+1].label)+'</button>';
  else if(di<DOCS.length-1) rhtml='<button data-k="d"><span class="d">Next chapter &rarr;</span>'+esc(DOCS[di+1].nav)+'</button>';
  nav.innerHTML=lhtml+rhtml;
  nav.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    if(b.dataset.k==='p') showPane(d,tabs,orig2tab,i-1,true);
    else if(b.dataset.k==='n') showPane(d,tabs,orig2tab,i+1,true);
    else go(DOCS[di+1].id);
  }));
  pane.appendChild(nav);

  (function linkRefs(){
    const walker=document.createTreeWalker(pane,NodeFilter.SHOW_TEXT,null);
    const hits=[];
    while(walker.nextNode()){
      const n=walker.currentNode;
      if(n.parentElement && n.parentElement.closest('pre,code,button,.secref')) continue;
      if(/Section \d+/.test(n.nodeValue)) hits.push(n);
    }
    hits.forEach(n=>{
      const re=/Section (\d+)( below| above)?/g;
      const frag=document.createDocumentFragment();
      let last=0, m, any=false;
      while((m=re.exec(n.nodeValue))){
        const ti=orig2tab[parseInt(m[1],10)];
        if(ti===undefined) continue;
        any=true;
        frag.appendChild(document.createTextNode(n.nodeValue.slice(last,m.index)));
        const b=document.createElement('button'); b.className='secref'; b.type='button';
        b.innerHTML='<span>'+(ti+1)+'.</span> '+esc(tabs[ti].label);
        b.addEventListener('click',ev=>{ ev.stopPropagation(); showPane(d,tabs,orig2tab,ti,true); });
        frag.appendChild(b);
        last=m.index+m[0].length;
      }
      if(!any) return;
      frag.appendChild(document.createTextNode(n.nodeValue.slice(last)));
      n.parentNode.replaceChild(frag,n);
    });
  })();

  host.innerHTML=''; host.appendChild(pane);
  if(scroll){
    try{ bar.scrollIntoView({block:'start'}); }catch(e){}
  }
  updateTabProg(d);
}

function renderDoc(d){
  view.innerHTML='<div class="chap"><p class="kicker">Front Matter</p><h1>'+d.nav+'</h1></div>'+
    '<article class="md docmode"></article>';
  const art=view.querySelector('article');
  art.innerHTML=marked.parse(d.md);
  if(d.id==='classes'){
    const tbl=[...art.querySelectorAll('table')].find(t=>/session/i.test(t.querySelector('th')?.textContent||''));
    if(tbl){
      const rows=[...tbl.querySelectorAll('tr')].filter(r=>r.querySelector('td'));
      const grid=document.createElement('div'); grid.className='sessgrid';
      rows.forEach(r=>{
        const c=[...r.children].map(td=>td.textContent.trim());
        const themeParts=c[1].split(':');
        const kick=themeParts.length>1?themeParts[0].trim():'';
        const title=themeParts.length>1?themeParts.slice(1).join(':').trim():c[1];
        const card=document.createElement('div'); card.className='sess';
        card.innerHTML='<div class="sn">'+c[0]+'</div><div class="sk">Session '+c[0]+(kick?' &middot; '+esc(kick):'')+'</div>'+
          '<div class="st">'+esc(title)+'</div>';
        const chips=document.createElement('div'); chips.className='chips';
        c[2].split(',').forEach(b=>{
          const m=b.trim().match(/^(\d\d)\s+(.*)$/); if(!m) return;
          const ch=document.createElement('button'); ch.className='chip';
          ch.innerHTML='<span class="n">'+m[1]+'</span>'+esc(m[2]);
          ch.addEventListener('click',()=>go('b'+m[1]));
          chips.appendChild(ch);
        });
        card.appendChild(chips); grid.appendChild(card);
      });
      tbl.parentNode.replaceChild(grid,tbl);
    }
  }
  dressCommon(art);
  folio.innerHTML='<b>'+d.folio+'</b>';
}

function recalc(){
  const r=document.getElementById('receipt'); if(!r) return;
  const S=calcState; const sel=[...S.sel];
  const lines=[]; let lo=0,hi=0;
  const add=(label,a,b,mut)=>{ lines.push({label,a,b,mut}); lo+=a; hi+=b; };
  if(!sel.length){ r.innerHTML='<div class="rline mut"><span class="rl">Select at least one build</span></div>'; return; }
  if(S.mode==='starter'){
    if(S.haveAI) add('AI subscription (yours)',0,0,true); else add('Claude Pro or ChatGPT Plus',20,20);
    sel.forEach(id=>{
      const c=COST[id]; const d=byId[id];
      if(c.startExtra) add('No.'+d.num+' SMS + registration',c.startExtra[0],c.startExtra[1]);
      else add('No.'+d.num+' manual, uses your AI sub',0,0,true);
    });
  } else {
    const needCRM=sel.some(id=>COST[id].crm);
    if(needCRM) add(S.haveCRM?'CRM (using yours)':'CRM (GoHighLevel)', S.haveCRM?0:97, S.haveCRM?0:97, S.haveCRM);
    add(S.haveSrv?'Automation (yours)':'Automation (n8n on a VPS)', S.haveSrv?0:5, S.haveSrv?0:10, S.haveSrv);
    if(!S.haveAI) add('Claude Pro (daily drafting)',20,20); else add('AI subscription (yours)',0,0,true);
    if(sel.some(id=>COST[id].sms)) add('SMS + carrier fees',10,25);
    sel.forEach(id=>{
      const c=COST[id]; const d=byId[id];
      add('No.'+d.num+' API usage',c.api[0],c.api[1]);
      if(c.extra) add('No.'+d.num+' '+c.extraLabel,c.extra[0],c.extra[1]);
    });
  }
  let h=lines.map(l=>'<div class="rline'+(l.mut?' mut':'')+'"><span class="rl">'+l.label+'</span><span class="dots"></span><span class="rv">'+(l.a===l.b?(l.a?'$'+l.a:'$0'):'$'+l.a+'-'+l.b)+'</span></div>').join('');
  h+='<div class="rtotal"><span class="rl">Total / mo</span><span class="dots"></span><span class="rv">$'+lo+'-'+hi+'</span></div>';
  const oneTime=[];
  if(S.mode==='full'||sel.includes('b05')){ if(sel.some(id=>COST[id].sms)||sel.includes('b05')) oneTime.push('A2P 10DLC registration $20-65 one-time'); }
  if(sel.includes('b01')) oneTime.push('farm seed list $0-40 one-time');
  if(sel.includes('b06')) oneTime.push('optional Plaud recorder $159 one-time');
  if(oneTime.length) h+='<div class="rnote">Plus '+oneTime.join('; ')+'. Ranges assume solo-agent volume.</div>';
  r.innerHTML=h;
}

function renderCover(){
  view.innerHTML=coverHTML();
  view.querySelectorAll('[data-id]').forEach(el=>el.addEventListener('click',()=>go(el.dataset.id)));
  view.querySelectorAll('[data-go]').forEach(a=>a.addEventListener('click',ev=>{ ev.preventDefault(); go(a.dataset.go); }));
  view.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
    calcState.mode=b.dataset.m;
    view.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('on',x===b));
    recalc();
  }));
  view.querySelectorAll('.crow').forEach(row=>{
    const t=()=>{
      if(row.dataset.b){ const id=row.dataset.b; calcState.sel.has(id)?calcState.sel.delete(id):calcState.sel.add(id); row.classList.toggle('on'); }
      else { const k=row.dataset.t; calcState[k]=!calcState[k]; row.classList.toggle('on'); }
      recalc();
    };
    row.addEventListener('click',t);
    row.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); t(); } });
  });
  recalc();
  folio.innerHTML='';
}

/* ---------- router ---------- */
function render(id){
  const d=byId[id]||DOCS[0];
  if(current===d.id) return;
  current=d.id;
  if(d.id==='cover') renderCover();
  else if(d.group==='front') renderDoc(d);
  else renderGuide(d);
  buildPager(d);
  document.querySelectorAll('.toc-item').forEach(b=>b.classList.toggle('active',b.dataset.id===d.id));
  document.title=(d.id==='cover'?'AI Agent Builds: The Field Manual':d.nav+' | AI Agent Builds');
  if(booted){
    try{ window.scrollTo(0,0); }catch(e){}
    try{ document.querySelector('.mast').scrollIntoView({block:'start'}); }catch(e){}
  }
  booted=true;
}

function buildPager(d){
  const i=DOCS.indexOf(d); let p='';
  if(i>0) p+='<a data-id="'+DOCS[i-1].id+'"><span class="dir">&larr; Previous</span><span class="pt">'+DOCS[i-1].nav+'</span></a>';
  if(i<DOCS.length-1) p+='<a class="next" data-id="'+DOCS[i+1].id+'"><span class="dir">Next &rarr;</span><span class="pt">'+DOCS[i+1].nav+'</span></a>';
  pager.innerHTML=p;
  pager.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>go(a.dataset.id)));
}

function closeNav(){ document.body.classList.remove('nav-open'); }
document.getElementById('menuBtn').addEventListener('click',()=>document.body.classList.toggle('nav-open'));
document.getElementById('scrim').addEventListener('click',closeNav);
window.addEventListener('hashchange',()=>render(location.hash.slice(1)));
if(CLIENT){ document.body.classList.add('client'); }
document.getElementById('buildsLabel').textContent='The '+NWORD+' Builds';
buildToc();
render(location.hash.slice(1)||'cover');
</script>

</body>
