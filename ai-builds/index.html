you.\n- **This generalizes past Texas.** The worked example is the TREC 1-4, but the same prompt structure works on any state's promulgated or association contract. Update the date-counting rules in the prompt to your state's conventions (business vs. calendar days, when the clock starts) before trusting it.\n"}, {"id": "b03", "file": "03-daily-call-list-database-miner.md", "nav": "Daily Call List Miner", "group": "builds", "num": "03", "diff": "Easy", "lvl": 1, "starter": "$0-20", "full": "$6-40", "line": "Mines your CRM nightly for revenue signals and emails you five names each morning with a reason and a drafted opener.", "md": "# Daily \"Who Should I Call\" Database Miner\n\nEvery morning, five names from your own database, each with a reason to call, a talking point, and a drafted opener, waiting in your inbox before your coffee is done.\n\n## 1. What It Is\n\nYou already own a goldmine: every past client, lead, and contact sitting in your CRM. The problem is that nobody looks at it. This build is a nightly robot that reads through your entire database while you sleep and hunts for reasons to reach out: a past client hitting 7 years in their home, a purchase anniversary next week, a birthday, a lead who was clicking your emails in March and then vanished, a renter whose lease ends in 60 days, or a contact who lives two streets over from a house that just listed or sold. Each morning it hands you a short list of exactly five people, tells you why today is the day to contact each one, gives you a talking point, and writes the first text or email for you. You read it, tweak it, and send it. That is the whole job.\n\n## 2. Why You Need It\n\nNAR's own research says the majority of sellers would use their agent again, but only a small fraction actually do, mostly because the agent never stayed in touch. Your database is not a list, it is deferred income. If you have 400 contacts and even 10 percent transact in a given year, that is 40 deals happening around you. An agent who calls 5 database contacts a day makes roughly 1,200 touches a year. At typical past-client conversion rates, that is 6 to 12 extra closings from people who already know you, with zero lead spend. Compare that to buying leads at $20 to $200 each with 1 to 3 percent conversion.\n\nThe time math is just as good. Manually reviewing a database for \"who should I call today\" takes 30 to 45 minutes and most agents never do it. This build compresses that to the 5 minutes it takes to read one email. It replaces nothing you currently pay for, because almost nobody pays for this. It creates a habit your CRM was supposed to create and never did.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| CRM with your contacts in it | The database being mined | GoHighLevel $97/mo (Starter) or $297/mo (Unlimited) | Follow Up Boss (approx. $58+/user/mo), kvCORE/BoldTrail (often free from your brokerage), Lofty, or literally any CRM that can export a CSV. Already have a brokerage CRM? It works. |\n| AI chat subscription (Starter) | Reads your export, picks the 5, writes the openers | Claude Pro $20/mo or ChatGPT Plus $20/mo | Free tiers work for small databases (under ~200 rows) but hit limits fast |\n| AI API (Full Build only) | Same brain, but callable on a schedule with no human | Claude API, pay per use, approx. $1-3/mo at this volume | OpenAI API equivalent |\n| Automation platform (Full Build only) | Runs the job nightly, moves the data | n8n self-hosted, free software on a $5-10/mo VPS; n8n Cloud approx. $24/mo | Make (Core $9-10/mo), Zapier (free tier is too small for this; Professional approx. $20/mo) |\n| Email delivery (Full Build only) | Lands the morning list in your inbox | Resend free tier (3,000 emails/mo) | Gmail node in n8n, or your CRM's built-in email |\n| MLS activity data (optional) | The \"new listing near your contact\" signal | Free via your MLS hotsheet or RPR | No feed? Use a weekly manual hotsheet printout or Cloud CMA export. Most agents skip this signal at first. |\n\n**Cheapest possible path:** your existing brokerage CRM's free CSV export + a free Claude or ChatGPT account + 20 minutes on Sunday night. Total: $0. The $20/mo AI subscription is the first upgrade worth paying for, because free tiers choke on big pastes.\n\n## 4. How It Works\n\n1. **Data comes out of the CRM.** Contact name, tags, address, purchase date, birthday, last activity date, and lease-end date if you track it. Starter: a CSV export. Full Build: an automatic API pull every night.\n2. **The signals get computed.** Simple date math finds anniversaries, 5-10 year homeowners, birthdays this week, and contacts gone quiet after a burst of engagement. Optionally, contact addresses get cross-checked against fresh MLS activity in their neighborhood.\n3. **AI ranks and writes.** Claude looks at every contact that tripped a signal, picks the best five for today (spreading out signal types so you are not calling five birthdays), and drafts a talking point plus a text and email opener for each.\n4. **The list lands where you will see it.** Starter: on your screen, and you copy it into your day. Full Build: an email at 6:30 a.m. and, optionally, five tasks created directly in your CRM so the calls sit in your pipeline.\n5. **You make five contacts.** The human does the relationship. The robot only does the remembering.\n\nWhy this architecture: the CRM stays the single source of truth, the AI never sends anything on its own, and the expensive part (your judgment and voice) is spent only on the final 5 minutes, not the 40 minutes of digging.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\nYou need: your CRM login and a Claude (or ChatGPT) account. This is a weekly 15-minute ritual, not a nightly automation, and it still beats what 95 percent of agents do.\n\n1. **Export your contacts to CSV.**\n   - GoHighLevel: Contacts > Smart Lists > select All, click the cloud/export icon top right > Export All > download the CSV from the email link.\n   - Follow Up Boss: People > select all > Actions > Export.\n   - kvCORE/BoldTrail: Contacts > Filters (none) > Export > CSV.\n   - Any other CRM: look for Contacts > Export. Every CRM has one.\n2. **Open the CSV and sanity-check the columns.** You want, at minimum: name, phone, email, tags or contact type, and any of these you have: home purchase/close date, birthday, address, created date, last activity date. Delete columns you do not need (notes, internal IDs). Smaller paste = better results.\n3. **If your CRM does not store purchase dates,** spend 10 minutes adding close dates for your past clients. This is the single highest-value field in the whole build. You can pull the dates from your closed-transaction folder, your title company, or old commission statements. Do your last 3 years first, backfill later.\n4. **Open Claude** (claude.ai) and start a new chat. If your file is under the upload limit, attach the CSV directly with the paperclip button. Otherwise paste 200-400 rows at a time.\n5. **Paste the Database Miner Prompt** from Section 7, then send.\n6. **Read the output.** You get 5 names, each with the signal, a talking point, and a drafted text and email. Edit anything that does not sound like you, then send the messages from your own phone and email like a normal human.\n7. **Log the touches in your CRM** (add a note or a \"contacted\" tag) so next week's run knows who you already reached.\n8. **Put a repeating 15-minute block on your calendar,** Sunday evening or Monday morning: export, paste, call. If you only want a fresh export monthly, keep the same CSV and just tell Claude today's date each time; the date math still works.\n\nThat is genuinely it. The Starter version is the habit. The Full Build just removes the export step and makes it daily.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nTarget: a scheduled n8n workflow that pulls GHL contacts nightly, computes signals, has Claude pick and draft, then emails you the list and creates the 5 tasks in GHL. Assumes n8n is already running (self-hosted on a Hostinger VPS or n8n Cloud) and you have admin access to the GHL sub-account. Zapier/Make users: see the one-line equivalents on each step; note that Zapier's schedule + loop pattern will burn tasks fast, Make is the better low-cost alternative.\n\n1. **Create a GHL Private Integration token.** In the sub-account: Settings > Private Integrations > Create New. Name it `db-miner`, grant scopes `contacts.readonly`, `contacts.write` (for tasks/notes), save, and copy the token. You will also need the Location ID: Settings > Business Profile > copy the Location ID string.\n2. **Store credentials in n8n.** In n8n: Credentials > Add Credential > Header Auth. Name: `GHL db-miner`. Header name: `Authorization`, value: `Bearer <your token>`. Add a second Header Auth or use n8n's built-in Anthropic credential for the Claude API key (get one at console.anthropic.com > API Keys). *(Make: add these as HTTP connections; Zapier: use \"Webhooks by Zapier\" with custom headers.)*\n3. **Node 1: Schedule Trigger.** Add a Schedule Trigger node, set to Every Day at 05:30 (your timezone). *(Zapier: Schedule by Zapier, daily. Make: scenario schedule, daily 05:30.)*\n4. **Node 2: HTTP Request, pull contacts.** GET `https://services.leadconnectorhq.com/contacts/?locationId=<LOCATION_ID>&limit=100`. Headers: your `GHL db-miner` credential plus `Version: 2021-07-28`. Enable pagination: in the node's Pagination settings, paginate using the `searchAfter` / `startAfterId` parameter from the response `meta` until empty (or simply loop pages while `meta.nextPageUrl` exists). For databases over ~2,000 contacts, add a filter to only pull contacts updated in the last 18 months plus anyone tagged `past-client`. *(Zapier/Make: \"Find Contacts\" / GHL \"Search Contacts\" module with the same filters.)*\n5. **Node 3: Code node, compute signals.** Paste the signal-scoring JavaScript from Section 7. It reads each contact's custom fields (`close_date`, `birthday`, `lease_end`, `last_activity`), computes which signals fire today, and outputs only contacts with at least one live signal, capped at the top 40 by score. Field mapping note: GHL custom fields arrive as an array of `{id, value}`; the script maps them by the field IDs you look up once at Settings > Custom Fields (click a field to see its ID) and paste into the `FIELD_IDS` map at the top of the script. *(Make: use a JavaScript module or an Iterator + filters per signal. Zapier: Code by Zapier step, same script.)*\n6. **Node 4 (optional): MLS cross-reference.** If you have a Supabase MLS feed (Cotality Trestle or similar), add an HTTP Request node: POST to your Supabase REST endpoint `https://<project>.supabase.co/rest/v1/rpc/recent_activity_by_zip` with the zips from your signal contacts, header `apikey: <anon key>`. Merge results into each contact as `nearby_activity`. **No MLS feed?** Skip this node, or replace it with a weekly manual step: export your MLS hotsheet (or RPR market activity report) to CSV, drop it in a Google Sheet, and read it with a Google Sheets node. The build works fine without this signal.\n7. **Node 5: Anthropic (Claude) node.** Add n8n's Anthropic node (or an HTTP Request to `https://api.anthropic.com/v1/messages`). Model: `claude-sonnet-4-5` (or current Sonnet). Max tokens: 2000. System prompt and user prompt: paste the API Ranking Prompt from Section 7, with the JSON from Node 3 injected as `{{ JSON.stringify($json.candidates) }}`. Ask for JSON output (the prompt already does). *(Zapier: Anthropic app, \"Send Message\". Make: Anthropic \"Create a Message\" module.)*\n8. **Node 6: Code node, parse the response.** Paste the parse-and-assemble snippet from Section 7 (under the morning email template). It parses Claude's JSON, throws a readable error if the parse fails, and outputs one item per pick with the finished email body attached.\n9. **Node 7: Send the morning email.** Add a Resend node (or SMTP/Gmail node). To: you. Subject: `Your 5 calls for {{ $now.format('ddd MMM D') }}`. Body: loop the 5 picks into the email template from Section 7. *(Zapier: Gmail \"Send Email\". Make: Email module.)*\n10. **Node 8: Create GHL tasks.** For each pick, HTTP Request: POST `https://services.leadconnectorhq.com/contacts/<contactId>/tasks` with headers as in step 4 and body `{\"title\": \"CALL: <reason>\", \"body\": \"<talking point + drafted opener>\", \"dueDate\": \"<today 17:00 ISO>\", \"completed\": false}`. Now the list also lives in your CRM pipeline. *(Zapier/Make: GHL \"Create Task\" action.)*\n11. **Node 9 (recommended): de-dupe memory.** Add an n8n Data Table (or Google Sheet) storing `contactId + date` for every pick. In Node 3, exclude anyone picked in the last 21 days. This stops the miner from serving you the same hot contact every morning.\n12. **Test, then activate.** Run once manually with Execute Workflow, confirm the email arrives and 5 tasks appear on the right contacts in GHL, then toggle the workflow Active. Check it daily for the first week; date math bugs always show up on real data.\n\n## 7. Prompts & Templates\n\n### Starter: Database Miner Prompt (paste with your CSV)\n\n```\nYou are my database mining assistant. I am a residential real estate agent.\nToday's date is [TODAY'S DATE]. Attached/pasted is my CRM contact export.\n\nScan every contact for these revenue signals, in priority order:\n1. OWNERSHIP WINDOW: purchase/close date 5-10 years ago (prime move-up window)\n2. ANNIVERSARY: home purchase anniversary within the next 14 days\n3. BIRTHDAY: birthday within the next 10 days\n4. GONE COLD: created or active within the last 12 months, engaged at some\n   point (opens, replies, showings, tags like \"hot\" or \"showing\"), but no\n   activity in the last 45-120 days\n5. LEASE END: renter tag or lease-end date within the next 90 days\n6. LONG SILENCE: past client with no touch logged in 6+ months\n\nRules:\n- Pick exactly 5 contacts. Mix the signal types; never 5 of the same signal.\n- Skip anyone marked do-not-contact, unsubscribed, or tagged as a vendor/agent.\n- If dates are missing for a contact, do not invent them; just use the\n  signals the data supports.\n- Match my tone: warm, brief, zero sales pressure, texts under 300 characters.\n\nFor each of the 5, output:\n- Name + phone/email from the file\n- SIGNAL: which signal fired and the specific data (e.g., \"closed 6/2019,\n  7-year anniversary\")\n- TALKING POINT: one sentence I can open a phone call with\n- TEXT DRAFT: ready to send, casual, no em dashes, ends with a soft question\n- EMAIL DRAFT: subject line + 3 short sentences max\n\nAfter the 5, add a one-line \"bench\" list of 5 runner-up names and signals\nso I can go deeper if I have time.\n```\n\n### Full Build: signal-scoring Code node (Node 3, JavaScript)\n\n```javascript\n// Map your GHL custom field IDs here (Settings > Custom Fields > click field)\nconst FIELD_IDS = {\n  close_date: \"PASTE_FIELD_ID\",\n  birthday: \"PASTE_FIELD_ID\",     // or use contact.dateOfBirth if set\n  lease_end: \"PASTE_FIELD_ID\",\n};\n\nconst now = new Date();\nconst days = (d) => Math.floor((now - new Date(d)) / 86400000);\nconst daysUntil = (d) => {\n  const t = new Date(d); t.setFullYear(now.getFullYear());\n  if (t < now) t.setFullYear(now.getFullYear() + 1);\n  return Math.floor((t - now) / 86400000);\n};\n\nconst out = [];\nfor (const item of $input.all()) {\n  const c = item.json;\n  const cf = {};\n  (c.customFields || []).forEach(f => {\n    for (const [k, id] of Object.entries(FIELD_IDS)) if (f.id === id) cf[k] = f.value;\n  });\n  const tags = (c.tags || []).map(t => t.toLowerCase());\n  if (tags.some(t => [\"dnd\", \"do-not-contact\", \"vendor\", \"agent\"].includes(t))) continue;\n  if (c.dnd === true) continue;\n\n  const signals = [];\n  if (cf.close_date) {\n    const yrs = days(cf.close_date) / 365.25;\n    if (yrs >= 5 && yrs <= 10) signals.push({ type: \"ownership_window\", score: 10, detail: `${yrs.toFixed(1)} years in home` });\n    const anniv = daysUntil(cf.close_date);\n    if (anniv <= 14) signals.push({ type: \"anniversary\", score: 8, detail: `purchase anniversary in ${anniv} days` });\n  }\n  const bday = cf.birthday || c.dateOfBirth;\n  if (bday && daysUntil(bday) <= 10) signals.push({ type: \"birthday\", score: 6, detail: `birthday in ${daysUntil(bday)} days` });\n  if (cf.lease_end) {\n    const le = Math.floor((new Date(cf.lease_end) - now) / 86400000);\n    if (le >= 0 && le <= 90) signals.push({ type: \"lease_end\", score: 9, detail: `lease ends in ${le} days` });\n  }\n  if (c.lastActivity) {\n    const quiet = days(c.lastActivity);\n    if (quiet >= 45 && quiet <= 120 && days(c.dateAdded) <= 365)\n      signals.push({ type: \"gone_cold\", score: 7, detail: `engaged lead, quiet ${quiet} days` });\n    if (quiet >= 180 && tags.includes(\"past-client\"))\n      signals.push({ type: \"long_silence\", score: 5, detail: `past client, ${quiet} days since last touch` });\n  }\n  if (signals.length) {\n    out.push({ json: {\n      contactId: c.id, name: `${c.firstName || \"\"} ${c.lastName || \"\"}`.trim(),\n      phone: c.phone, email: c.email, address: c.address1, city: c.city,\n      postalCode: c.postalCode, tags: c.tags,\n      signals, score: signals.reduce((a, s) => a + s.score, 0),\n    }});\n  }\n}\nout.sort((a, b) => b.json.score - a.json.score);\nreturn out.slice(0, 40);\n```\n\n### Full Build: API Ranking Prompt (Node 5)\n\n```\nSystem:\nYou are a database mining assistant for a residential real estate agent.\nYou receive JSON candidates that already passed signal detection. Pick the\nbest 5 for today. Mix signal types; never pick 5 of the same type. Prefer\nhigher scores but use judgment (a lease ending in 30 days beats a birthday).\nNever invent facts not present in the data. Tone for drafts: warm, brief,\ncasual, no sales pressure, no em dashes, texts under 300 characters ending\nin a soft question. Output ONLY valid JSON, no markdown fences.\n\nUser:\nToday is {{ $now.format('yyyy-MM-dd') }}. Candidates:\n{{ JSON.stringify($json.candidates) }}\n\nReturn exactly this shape:\n{\"picks\":[{\"contactId\":\"\",\"name\":\"\",\"phone\":\"\",\"email\":\"\",\n\"reason\":\"one line: which signal and the specific data\",\n\"talking_point\":\"one sentence to open a call\",\n\"text_draft\":\"\",\"email_subject\":\"\",\"email_draft\":\"\"}]}\n```\n\n### Morning email template (Node 7 body, plain text)\n\n```\nYour 5 calls for {{date}}\n\n{{#each picks}}\n{{@index+1}}. {{name}} ({{phone}})\n   WHY: {{reason}}\n   SAY: {{talking_point}}\n   TEXT: {{text_draft}}\n   EMAIL: {{email_subject}} / {{email_draft}}\n\n{{/each}}\nReply DONE when all 5 are made. Streak counts.\n```\n\nThe `{{#each}}` syntax above is the shape, not literal n8n code. The easiest way to build it: in Node 6, after parsing, assemble the whole email body as one string and pass it forward, like this:\n\n```javascript\nlet picks;\ntry {\n  picks = JSON.parse($json.content[0].text).picks;\n} catch (e) {\n  throw new Error(\"Claude did not return valid JSON: \" + $json.content[0].text);\n}\nconst body = \"Your 5 calls for \" + new Date().toDateString() + \"\\n\\n\" +\n  picks.map((p, i) =>\n    `${i + 1}. ${p.name} (${p.phone})\\n   WHY: ${p.reason}\\n   SAY: ${p.talking_point}\\n   TEXT: ${p.text_draft}\\n   EMAIL: ${p.email_subject} / ${p.email_draft}`\n  ).join(\"\\n\\n\") +\n  \"\\n\\nReply DONE when all 5 are made. Streak counts.\";\nreturn picks.map(p => ({ json: { ...p, body } }));\n```\n\nThis outputs one item per pick (which Node 8 loops over to create tasks) with the full email body attached to each. In the Resend/Gmail node, set the text field to `{{ $json.body }}` and, in the node's Settings tab, turn on **Execute Once** so it sends one email instead of five.\n\n### Sample text openers (the quality bar for drafts)\n\n```\nAnniversary: \"Hey Sarah, just realized it's been 6 years since we closed on\nMaple St. Time flies. How's the house treating y'all?\"\n\nGone cold: \"Hey Mike, you crossed my mind today. Still keeping an eye on\nthe market or did life get busy? No pressure either way.\"\n\nNearby activity: \"Hey Dana, a house two streets over from you just hit the\nmarket at $415K. Figured you'd want to know what that does for your value.\nWant the full picture?\"\n```\n\n## 8. What It Costs\n\n### Starter\n\n| Item | Startup | Monthly |\n|---|---|---|\n| CRM export | $0 (built into every CRM) | $0 |\n| Claude Pro or ChatGPT Plus | $0 | $0-20 (free tier works under ~200 contacts) |\n| Your time | 30-60 min setup | ~15 min/week |\n| **Total** | **$0** | **$0-20** |\n\n### Full Build\n\n| Item | Startup | Monthly |\n|---|---|---|\n| GoHighLevel (or your existing CRM) | $0 | $97 (skip if brokerage-provided; then $0) |\n| n8n self-hosted on VPS | ~1-2 hrs setup (or Bradley does it) | $5-10 (VPS) or approx. $24 n8n Cloud |\n| Claude API | $0 | $1-3 (assumes 1 nightly call, ~40 candidates, ~6K input + 1.5K output tokens on Sonnet, roughly $0.04-0.10/day) |\n| Resend email | $0 | $0 (free tier, 3,000/mo) |\n| Make/Zapier alternative | $0 | Make Core $9-10, Zapier Professional approx. $20 |\n| **Total (already have a CRM)** | **$0** | **$6-40** |\n| **Total (adding GHL)** | **$0** | **$103-135** |\n\n## 9. Compliance & Gotchas\n\n- **You send the messages, not the robot.** This build drafts; a human reviews and sends. Auto-sending AI-drafted texts to your database is how you end up apologizing for a hallucinated anniversary. Keep the human in the loop, always.\n- **TCPA and A2P 10DLC:** if you graduate to sending texts through GHL (or any platform) instead of your personal phone, your number must be A2P 10DLC registered (GHL walks you through it under Settings > Phone Numbers > Trust Center) and you need prior consent for marketing texts. Texting from your own phone to people you have a relationship with is the safer starting lane. Honor every opt-out instantly and record it in the CRM.\n- **Do-not-contact flags are sacred.** The signal script skips DND-flagged contacts. Test that it actually does before going live; one text to someone who opted out costs you more than the build ever earns.\n- **Fair housing:** never let neighborhood signals become steering. Talking points must stick to the transaction facts (price, days on market, your contact's likely equity), never commentary about who is moving in or what the neighborhood is \"becoming.\" Review AI drafts for this specifically.\n- **TREC/NAR advertising rules:** drafted texts and emails from you as a licensee are advertising. In Texas that means your name as licensed and your brokerage must be identifiable in email (signature block solves it) and no misleading claims. \"Your home is worth $450K\" is a claim; \"homes near you are selling around $450K, want a real number?\" is safer. Check your own state's equivalent.\n- **A CMA is not an appraisal.** If a value conversation starts (and the nearby-activity opener is designed to start one), what you deliver is a comparative market analysis or broker price opinion, never an \"appraisal.\" Only a licensed appraiser performs appraisals, and calling your number one is a license violation in Texas and most states. Say \"market analysis\" and, when you put a number in writing, include your standard CMA disclaimer.\n- **MLS data rules:** MLS/IDX data has display and use restrictions. Using sold data to inform a private one-to-one conversation is generally fine; mass-blasting sold prices may not be. If you have a RESO feed, know your license terms. RPR data is member-use only.\n- **Data privacy:** your CSV contains personal data. Use a paid AI account (consumer paid tiers do not train on your data by default, but verify the setting: in ChatGPT, disable \"Improve the model for everyone\"; Claude consumer accounts have a training toggle at signup and in Privacy Settings, so confirm it is off). Do not paste your database into random free AI tools. Delete old exports from your Downloads folder.\n- **Stale data makes confident nonsense.** If your close dates are wrong, the AI will cheerfully congratulate someone on an anniversary of a house they sold. Garbage in, embarrassing text out. Budget one cleanup session before trusting the output.\n- **Rate limits:** GHL's API paginates at 100 contacts per call and rate-limits bursts. The nightly schedule at 5:30 a.m. avoids all of it, but do not run the workflow in a tight testing loop against a 5,000-contact database.\n"}, {"id": "b04", "file": "04-home-anniversary-equity-report.md", "nav": "Home Anniversary Equity Report", "group": "builds", "num": "04", "diff": "Medium", "lvl": 2, "starter": "$0-20", "full": "$6-160", "line": "Sends every past client a what-your-home-is-worth-now one-pager on their closing anniversary, with a review gate on the number.", "md": "# Home Anniversary Equity Report\n\nEvery past client gets a personalized \"here's what your home is worth now\" one-pager on the anniversary of their closing, automatically, every year, forever.\n\n## 1. What It Is\n\nOne year after a client buys a house, most agents send nothing. Maybe a happy anniversary text if the CRM reminds them. This build replaces that with something a client actually keeps: a one-page report that shows what they paid, what their home is probably worth today, roughly how much equity they have gained, and what is selling in their neighborhood right now. It closes with a soft question: want a real valuation, thinking about a move, or curious about your loan options?\n\nYou already have every piece of data this needs. You know what they paid (you were at the closing). You know their address. You can pull two or three nearby sales in five minutes. The AI turns those raw numbers into a clean, friendly, branded report. The automation makes sure it goes out on the right date every year without you remembering anything.\n\n## 2. Why You Need It\n\nNAR's own surveys say roughly 3 out of 4 buyers say they would use their agent again, but only about 1 in 4 actually do. The gap is not loyalty, it is contact. The agent who shows up once a year with the client's own equity number is the agent who gets the listing call, the referral, and the \"my sister is moving to Fort Worth\" text. Homeowners open anything with their address and a dollar figure on it. This is the highest-open-rate touch you can send that is not a bill.\n\nTime math: doing this by hand takes 20-30 minutes per client (pull comps, build a page, write the note, send it). At 50 past clients a year that is 20+ hours. The Starter version cuts each one to about 8 minutes. The Full Build cuts it to a 60-second review and click. One listing recaptured from a past client pays for a decade of this system.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| Chat AI (Claude Pro or ChatGPT Plus) | Writes the report from your numbers, formats the one-pager | $20/mo | Free tiers work for Starter; already have either? it works |\n| Claude API (Full Build only) | Generates the report inside the automation, no chat window | Pay per use, well under $1/mo at this volume | OpenAI API equivalent |\n| CRM with custom fields | Stores purchase date, price, address; fires the annual trigger | GHL $97/mo (Starter) or $297/mo (Unlimited) | Follow Up Boss, kvCORE/BoldTrail (often brokerage-paid), Lofty, or your brokerage's free CRM if it supports custom date fields and automations |\n| Automation platform (Full Build only) | Catches the trigger, calls the AI, builds the PDF, routes to review | n8n self-hosted approx $5-10/mo VPS, or n8n Cloud approx $24/mo | Make free tier (1,000 credits/mo) or Core $9/mo; Zapier free (100 tasks/mo) or Pro $29.99/mo |\n| Comp data source | The \"current value\" evidence | Free | MLS (best), RPR (free with NAR membership), Cloud CMA if your board provides it, Realtor.com/Zillow as last resort with disclaimers |\n| Calendar | Starter version's \"automation\" | Free | Google Calendar, Outlook, your CRM's task reminders |\n| Email sender | Delivers the report | Included in CRM, or Resend free tier (3,000 emails/mo) | Gmail works fine at Starter volume |\n| PDF/page generator (Full Build) | Turns the AI's HTML into a branded PDF or web page | Free (HTML-to-PDF in n8n) or approx $9/mo (PDF service like PDFShift/APITemplate) | Skip PDF entirely and send a styled HTML email |\n\n**Cheapest possible path:** free ChatGPT or Claude account, Google Calendar reminders, comps from your MLS or RPR (free with your NAR dues), send from Gmail. Total: $0. The only thing money buys you is automation.\n\n## 4. How It Works\n\n1. **Data in:** each past client has four facts on file: name, property address, purchase date, purchase price. Full Build stores these as CRM custom fields; Starter stores them in a simple spreadsheet.\n2. **Trigger:** the purchase anniversary arrives. Starter: a calendar reminder pings you. Full Build: the CRM fires an automation on the anniversary date.\n3. **Comps in:** you (Starter) or your data source (Full Build) supply 2-3 recent nearby sales and a value estimate range.\n4. **AI does the work:** Claude takes the purchase facts plus comps and writes the one-pager: value range, estimated equity gained, neighborhood snapshot, soft CTA, required disclaimer.\n5. **Output lands:** Starter: you paste the result into an email and hit send. Full Build: the system drafts a branded HTML report, parks it in a review queue, and you approve with one click before it emails the client.\n\nWhy this architecture: the value estimate is the one part that must never be fully automated without eyes on it. Everything around it (dates, formatting, delivery) is pure clockwork, so automate the clockwork and keep a human review step on the number.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\n1. **Build your roster (20 min).** Open Google Sheets. Make columns: Client Name, Email, Property Address, Closing Date, Purchase Price, Anniversary Month/Day, Notes. Fill it from your closed files. Even 3 years back is worth it. If your CRM has this data, export it to CSV and paste it in.\n2. **Set the reminders (10 min).** In Google Calendar, create one event per client on their anniversary date. Title: \"Equity Report: [Client Name]\". Set it to repeat yearly. In the event description, paste that client's row from the sheet (address, price, closing date) so everything you need is in the reminder itself. Tip: set the reminder 3 days BEFORE the anniversary so the report lands on the day.\n3. **Save the prompt (5 min).** Copy the Starter prompt from Section 7 into a note on your phone, or better, save it as a Claude Project / ChatGPT custom instruction named \"Equity Report\" so you never paste the boilerplate again.\n4. **When a reminder fires, pull comps (5 min per client).** Open your MLS and search sold listings: same subdivision or half-mile radius, last 6 months, similar bed/bath/sqft. Grab 2-3. For each, note: address (street only is fine), sold price, beds/baths, square footage, sold date. No MLS access handy? Log into RPR (narrpr.com, free with your NAR membership), search the client's address, and use the RVM value plus the nearby sales it lists. Last resort: Realtor.com sold filter, but label it as a public estimate.\n5. **Run the prompt (2 min).** Open your saved prompt, fill in the client's numbers and the comps, send. Claude returns the finished report text.\n6. **Sanity-check the number (1 min).** Does the value range pass your professional gut check against the comps? If not, adjust and regenerate. You are the licensee; the AI is a typist.\n7. **Send it (2 min).** Paste into a personal email from your normal address. Subject line suggestion: \"Happy 3rd home anniversary, here's what [street name] is worth now\". No mass-email tool, no template smell. Personal sends get replies.\n8. **Log it.** Put a checkmark and date in your sheet's Notes column. When someone replies \"actually, we HAVE been thinking about selling,\" that goes straight to your hot list.\n\nRealistic pace: after setup, about 8 minutes per client per year.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nThis is the GHL + n8n + Claude API version. Zapier/Make equivalents are noted per step. Assumes you or your operator already have a GHL sub-account and a running n8n instance.\n\n1. **Create the custom fields in GHL.** Settings > Custom Fields > Add Field, folder \"Home Anniversary\". Create: `purchase_date` (Date), `purchase_price` (Monetary), `property_address` (Single Line), `property_city_zip` (Single Line), `beds_baths_sqft` (Single Line), `last_report_sent` (Date), `equity_report_optout` (Checkbox). Backfill them for your past clients via CSV import (Contacts > Import, map columns to the new fields).\n2. **Tag your audience.** Bulk-tag all backfilled contacts `past-client`. The automation only fires on this tag, so nobody else ever gets a report by accident.\n3. **Build the GHL trigger workflow.** Automation > Workflows > Create Workflow > Start from Scratch. Trigger: \"Contact Date Reminder\" (GHL's field-anniversary trigger), field = `purchase_date`, condition = \"Month and Day match today\" (this makes it fire every year, not once), filter: tag is `past-client` AND `equity_report_optout` is not checked. Add one action: **Webhook** (the \"Custom Webhook\" action), method POST, URL = your n8n webhook URL from step 4. In the webhook's custom data, map: `contact_id`, `first_name`, `email`, `property_address`, `property_city_zip`, `purchase_date`, `purchase_price`, `beds_baths_sqft`. *(Zapier: trigger \"Date/Time in field reached\" from your CRM, or Follow Up Boss \"Deal anniversary\"; Make: CRM watch module plus a date filter.)*\n4. **Create the n8n workflow.** In n8n, new workflow, first node: **Webhook** (method POST, path `equity-report`, respond immediately). Click \"Listen for test event\", then in GHL hit \"Test Webhook\" on the workflow action so n8n captures the field structure. Copy the Production URL back into the GHL webhook action. *(Zapier: this whole workflow is \"Webhooks by Zapier catch hook\" then the steps below; Make: Custom Webhook module.)*\n5. **Get comps into the flow.** Pick one honestly:\n   - **Option A, MLS feed (Bradley's stack):** add a Supabase/Postgres node querying your RESO listings table: closed status, within the client's ZIP, closed in last 180 days, similar sqft band, `ORDER BY close_date DESC LIMIT 3`. Most agents will not have this.\n   - **Option B, human-in-the-loop comps (recommended for everyone else):** add a Slack or email node that messages YOU: \"Equity report firing for [name] at [address]. Reply to the n8n form with 2-3 comps.\" Use an n8n Form node (or a simple Wait node with a resume webhook) to accept the comps, then continue. You spend the same 5 MLS minutes as Starter, but everything else is automated.\n   - **Option C, public AVM:** some AVM APIs exist (RentCast and similar, approx $0-50/mo tiers). If you use one, the report MUST label it as an automated public estimate, not your opinion of value.\n6. **Add the AI node.** n8n **HTTP Request** node to `https://api.anthropic.com/v1/messages`, POST, headers `x-api-key` (your key, stored as an n8n credential), `anthropic-version: 2023-06-01`, `content-type: application/json`. Body: model `claude-sonnet-4-5` (or current Sonnet), `max_tokens: 3000`, and a `messages` array containing the Full Build prompt from Section 7 with the webhook and comp fields templated in via n8n expressions like `{{ $json.purchase_price }}`. *(Zapier: \"Anthropic > Send Message\" native action; Make: Anthropic Claude module.)*\n7. **Render the report.** The prompt returns complete HTML. Two delivery choices:\n   - **HTML email (simplest):** skip PDF, send the HTML directly as the email body.\n   - **PDF attachment:** add an HTML-to-PDF step (Gotenberg container on the same VPS is free, or an API like PDFShift, approx $9/mo), then attach the binary to the email node.\n8. **Insert the review gate. Do not skip this.** Instead of emailing the client directly, have n8n email the DRAFT to you (or post it to Slack) with an \"Approve and Send\" link. To build that link: create a second n8n workflow whose first node is a Webhook (method GET, path `equity-approve`), followed by the send-and-log steps from step 9. In the draft email to yourself, make the link `[that webhook's production URL]?contact_id={{ $json.contact_id }}`, and have the approve workflow read `contact_id` from the query string to pull the stored report (easiest: have the main workflow save the rendered HTML to a GHL contact note or an n8n Data Table row keyed by contact_id, and have the approve workflow fetch it from there). Clicking the link in your inbox is the approval. Alternative inside GHL: have n8n write the report into the contact and add tag `report-ready`, which triggers a GHL Internal Notification task; you eyeball it and manually fire the send step. Either way, a licensed human sees the value number before the client does.\n9. **Send and log.** On approval, the final n8n branch: (a) sends the email to the client (Resend node, GHL email via API, or SMTP), subject \"Happy home anniversary! Here's your [year] equity update for [street]\", (b) updates GHL via API: set `last_report_sent` to today and add a note \"Equity report sent [date], est. range [range]\" so the next conversation has context, (c) optionally sends the client an SMS nudge two days later IF they have prior consent (see Section 9).\n10. **Test end to end.** Set your own test contact's `purchase_date` month/day to today, run the GHL workflow test, and follow the payload through n8n. Check: fields mapped, comps requested, AI output sane, review email arrives, approve link sends, `last_report_sent` updates. Then set a calendar note to spot-check the first three real sends.\n\n## 7. Prompts & Templates\n\n**Starter prompt (paste into Claude or ChatGPT, fill the brackets):**\n\n```\nYou are helping me, a licensed Texas real estate agent, write a one-page\n\"Home Anniversary Equity Report\" for a past client. Warm, plain-English,\nzero hype. Short sections with bold headers. Keep it under 350 words.\n\nCLIENT FACTS\n- Client first name: [NAME]\n- Property: [ADDRESS, CITY, ZIP]\n- Purchased: [MONTH YEAR], [X] years ago\n- Purchase price: $[PRICE]\n- Home: [BEDS] bed / [BATHS] bath, [SQFT] sqft\n\nRECENT NEARBY SALES (my comps, pulled today)\n1. [STREET], sold $[PRICE], [BEDS]/[BATHS], [SQFT] sqft, sold [MONTH]\n2. [STREET], sold $[PRICE], [BEDS]/[BATHS], [SQFT] sqft, sold [MONTH]\n3. [STREET], sold $[PRICE], [BEDS]/[BATHS], [SQFT] sqft, sold [MONTH]\n\nWRITE THESE SECTIONS\n1. \"Happy Home Anniversary\" - one warm sentence marking [X] years.\n2. \"What You Paid\" - the purchase price and date, one line.\n3. \"What It's Likely Worth Today\" - give a VALUE RANGE (not a single\n   number) reasoned from the comps, adjusting for size differences.\n   Show the 2-3 comps in a tiny table.\n4. \"Your Estimated Equity Gain\" - value range minus purchase price,\n   as a range. Note this ignores their loan balance and any upgrades,\n   which could move it either direction.\n5. \"What's Happening in [NEIGHBORHOOD/CITY]\" - two sentences max from\n   the comps (pace, prices). No invented statistics.\n6. Soft close - one short paragraph: happy to run a real valuation,\n   talk through a move, or connect them with a lender about their\n   loan options. No pressure.\n7. Disclaimer, exactly: \"This is an informal estimate based on recent\n   nearby sales, not an appraisal or a Comparative Market Analysis.\n   For a precise valuation of your home, I'm happy to prepare one,\n   just reply to this email.\"\n\nRULES\n- Never state a single \"your home is worth $X\" figure. Always a range.\n- Do not invent market data, school info, or trends not in my comps.\n- Do not use em dashes anywhere.\n- End with my signature block: [YOUR NAME, LICENSE #, BROKERAGE, PHONE]\n```\n\n**Full Build system prompt (goes in the API call body; n8n expressions fill the variables):**\n\n```\nYou generate a \"Home Anniversary Equity Report\" as a single complete\nHTML email (inline CSS only, max width 600px, mobile-friendly, brand\ncolors {{BRAND_HEX}}, logo img at {{LOGO_URL}}).\n\nData: first_name={{first_name}}, address={{property_address}},\ncity_zip={{property_city_zip}}, purchase_date={{purchase_date}},\npurchase_price={{purchase_price}}, home={{beds_baths_sqft}},\nyears_owned={{years_owned}}, comps={{comps_json}},\nagent={{AGENT_NAME}}, license={{LICENSE_NO}}, brokerage={{BROKERAGE}},\nphone={{AGENT_PHONE}}, email={{AGENT_EMAIL}}.\n\nSections, in order: warm anniversary opener; What You Paid; What It's\nLikely Worth Today (a RANGE derived from comps, plus a small comps\ntable); Your Estimated Equity Gain (range minus purchase price, note\nit excludes loan balance and upgrades); a two-sentence neighborhood\nnote drawn ONLY from the comps; a soft CTA offering a free full\nvaluation, a move conversation, or a lender introduction, with a\nmailto and tel link; the exact disclaimer: \"This is an informal\nestimate based on recent nearby sales, not an appraisal or a\nComparative Market Analysis. For a precise valuation of your home,\njust reply to this email.\"; signature block with license number and\nbrokerage as required by TREC advertising rules.\n\nHard rules: never output a single-figure value, always a range; never\ninvent data not present in comps_json; if comps_json has fewer than 2\ncomps, output exactly the string NEED_COMPS and nothing else; no em\ndashes; output raw HTML only, no markdown, no commentary.\n```\n\n(The `NEED_COMPS` sentinel lets an n8n IF node halt the flow and ping you instead of sending a data-starved report.)\n\n**Approval email template (n8n sends this to you):**\n\n```\nSubject: REVIEW: Equity report for {{first_name}} - {{property_address}}\n\nAnniversary today: {{years_owned}} years.\nPaid: ${{purchase_price}} | Est. range in draft: check below.\n\n[Rendered report preview]\n\nApprove and send: {{approve_webhook_url}}\nProblem with the number? Fix comps in n8n execution {{execution_id}}\nand re-run.\n```\n\n**Subject line options (rotate by year so repeat sends stay fresh):**\n\n```\nYear 1: Happy 1st home anniversary! Here's what [STREET] is worth now\nYear 2: Two years in: your [STREET] equity update\nYear 3: [FIRST NAME], your home has been busy. Year 3 equity report\nYear 5+: [X] years at [STREET]: your annual equity check-in\n```\n\n**SMS follow-up template (Full Build step 9, only with prior consent\nand an A2P-registered number; sent 2 days after the email):**\n\n```\nHi [FIRST NAME], it's [AGENT] with [BROKERAGE]. I emailed your\n[STREET] home anniversary equity report a couple days ago. Short\nversion: your estimated equity gain since buying is in the\n[$LOW]-[$HIGH] range. Want the full report resent, or a real\nvaluation? Reply STOP to opt out.\n```\n\n**Reply-handling prompt (paste a client's reply into your chat AI when\nsomeone bites):**\n\n```\nA past client just replied to my home anniversary equity report.\nTheir reply: \"[PASTE REPLY]\".\nContext: bought [ADDRESS] in [YEAR] for $[PRICE]; my report estimated\n[$LOW]-[$HIGH].\nDraft a short, warm response from me ([AGENT NAME]) that answers their\nquestion, offers ONE concrete next step (a free full CMA, a call this\nweek, or a lender intro, whichever fits their reply), and proposes a\nspecific day/time. Under 120 words. No pressure language. No em dashes.\n```\n\n## 8. What It Costs\n\n**Starter**\n\n| Item | Startup | Monthly |\n|---|---|---|\n| Claude Pro or ChatGPT Plus (optional, free tiers work) | $0 | $0-20 |\n| Google Sheets + Calendar + Gmail | $0 | $0 |\n| MLS / RPR comps | included in dues you already pay | $0 |\n| Your time | ~1 hr setup | ~8 min per client anniversary |\n| **Total** | **$0** | **$0-20** |\n\n**Full Build**\n\n| Item | Startup | Monthly |\n|---|---|---|\n| GHL sub-account | $0 | $97 (Starter plan) or $0 if you already run GHL |\n| n8n self-hosted on VPS | ~1-2 hr install (or already running) | approx $5-10 (n8n Cloud approx $24; Make $0-9; Zapier $0-30) |\n| Claude API usage | $5 min credit | under $1 (assumes 100 clients/yr, ~3k tokens in / 2k out per report on Sonnet, roughly $0.05 per report; Haiku is a few cents total) |\n| PDF rendering (optional) | $0 | $0 (Gotenberg) to approx $9 (hosted API) |\n| Email delivery | $0 | $0 (GHL email or Resend free tier) |\n| Build labor if outsourced | approx $300-750 one-time | $0 |\n| **Total (already on GHL)** | **~$5-50** | **approx $6-20** |\n| **Total (all new)** | **~$5-800** | **approx $105-160** |\n\nHonest note: nobody should buy GHL just for this build. If this is your first automation, run Starter, and adopt the Full Build when a CRM is carrying three or four builds from this playbook.\n\n## 9. Compliance & Gotchas\n\n- **You are giving an opinion of value adjacent thing.** In Texas, a CMA by a licensee for a client is fine, but never let the report look like an appraisal. Keep the disclaimer in every send, keep ranges not single numbers, and keep a human review before send. Other states have stricter BPO rules; check yours.\n- **TREC advertising rules apply.** The report is an advertisement. It needs your name as licensed, your brokerage name, and must not be misleading. Include your license number. If you are a team, follow TREC team advertising rules on names and broker prominence.\n- **MLS data rules.** Sold data displayed to consumers is governed by your MLS's rules (many require sold-data display agreements, and IDX/VOW rules differ). Quoting 2-3 comps in a private 1-to-1 email to your own past client is generally the safest lane; publishing the same report on a public webpage is a different animal. When in doubt, ask your MLS compliance desk. Never scrape Zillow/Realtor.com into an automated pipeline; their terms prohibit it.\n- **AVM honesty.** If a value came from an AVM (RPR RVM, a public estimate, an API), label the source. Presenting an AVM number as your professional opinion is how you end up explaining yourself to a commission.\n- **Fair housing.** Keep neighborhood commentary strictly to market facts (prices, days on market, sale counts). No commentary on who is moving in, school \"quality\" as a proxy, crime, or demographic anything. The prompt's \"no invented data\" rule helps; your review step is the real safeguard.\n- **SMS needs consent and registration.** The follow-up text in step 9 requires prior express consent from the client and, if sent through a CRM, an A2P 10DLC registered number (GHL walks you through registration; expect roughly $20-30 in one-time fees plus small monthly campaign costs). Email-only is fine and skips all of this.\n- **CAN-SPAM basics.** Include your physical address and honor unsubscribes. The `equity_report_optout` checkbox exists so \"please stop sending these\" actually stops them.\n- **Data privacy.** Purchase price and address are technically public record in most counties, but treat the roster like client data: keep API keys out of prompts, keep the sheet access-controlled, and do not paste client rosters into free AI tools whose training settings you have not checked (in Claude and ChatGPT paid plans, verify data controls).\n- **Where a human MUST review:** the value range before every send, the comps feeding it, and any reply that comes back. An automated report with a wrong number does real damage to trust; a reviewed one builds it.\n- **Loan balance is invisible to you.** Equity gain in this report is value minus purchase price, not value minus mortgage. The template says so. Do not let a rewrite drop that line.\n"}, {"id": "b05", "file": "05-speed-to-lead-sms-ai.md", "nav": "Speed-to-Lead SMS AI", "group": "builds", "num": "05", "diff": "Advanced", "lvl": 3, "starter": "$5-35", "full": "$120-160", "line": "Texts new leads back in under 60 seconds, qualifies them by SMS, books the appointment, and goes silent when you take over.", "md": "# Speed-to-Lead Conversational SMS AI\n\nEvery new lead gets a text back in under 60 seconds, gets qualified in a natural conversation, and lands on your calendar, even when you are showing a house.\n\n## 1. What It Is\n\nThis is an AI assistant that answers your new leads by text message the moment they come in. When someone fills out a form on your website, clicks a Zillow or Facebook ad, or scans a yard sign QR code, the AI texts them back within a minute, introduces itself as your assistant, and has a real back-and-forth conversation. It asks the same questions a good inside sales agent would ask: are you buying or selling, what area, what timeline, have you talked to a lender. When the lead is warm, it offers times and books an appointment on your calendar. The second you jump into the thread yourself, the AI goes quiet and stays quiet. You are not replaced. You are covered for the first five minutes you can never seem to be available for.\n\n## 2. Why You Need It\n\nThe speed-to-lead research has been consistent for years: contacting a lead within 5 minutes makes you far more likely to reach and convert them than waiting even 30 minutes, and most internet leads go to whoever responds first. Meanwhile the average agent response time is measured in hours, because you are in showings, inspections, and closings all day. If you buy leads at $10 to $50 each and answer half of them late, you are burning half your lead spend.\n\nRun the math on what this replaces. A part-time human ISA costs $1,500 to $3,000 a month plus training and turnover. A done-for-you AI ISA service runs $179 to $500 a month. The builds in this guide get you the same first-touch coverage for $0 to $160 a month, and the AI works nights, weekends, and holidays without complaining. If it converts even one extra closing a year, it paid for itself many times over.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| CRM with SMS (GoHighLevel) | Receives leads, sends/receives texts, holds the conversation thread, hosts the calendar | $97/mo Starter, $297/mo Unlimited | Follow Up Boss (approx. $58/user/mo), kvCORE/BoldTrail (often free via brokerage), Lofty. Already have a brokerage CRM? It works for Tier C |\n| GHL Conversation AI or AI Employee | The AI that reads and writes the texts (Tier A) | $0.02/message pay-as-you-go, or $97/mo unlimited per sub-account | Tier B uses Claude API instead; Tier C uses your CRM's add-on |\n| Claude API | The conversation brain for the custom build (Tier B) | Pay per use, roughly $3-10/mo at typical lead volume | OpenAI API works the same way in the n8n node |\n| n8n (self-hosted) | The automation layer wiring webhooks, AI, and SMS together (Tier B) | Free software + $5-10/mo VPS | n8n Cloud approx. $24/mo, Make approx. $9-19/mo, Zapier approx. $20-30/mo |\n| A2P 10DLC registration | Carrier registration so your texts actually deliver | $4-48 one-time + $1.50-10/mo + ~$0.003-0.005/text carrier fee | Required on every platform, no alternative |\n| Calendar with booking link | Where appointments land | Free (GHL calendar, Calendly free, Google appointment slots) | Already have Calendly? It works |\n| Claude Pro or ChatGPT Plus | Writing and stress-testing your qualification script, running the Starter version | $20/mo (free tiers work for light use) | Either one is fine |\n\nCheapest possible path: you already have a CRM with texting (most brokerage CRMs qualify), a free Calendly, and a free Claude or ChatGPT account. Register A2P through your CRM, use the Starter version below, and your only new cost is roughly $5 to 15 a month in registration and message fees.\n\n## 4. How It Works\n\n1. A lead comes in from any source (website form, Zillow, Facebook lead ad, sign call text) and lands in your CRM as a new contact with a tag like `new-lead`.\n2. That tag fires a trigger. Within 60 seconds the system sends the first text from your registered business number, identified as your assistant.\n3. Every reply from the lead is passed to the AI along with the full conversation history and your qualification script. The AI writes the next message: one question at a time, short, human-sounding.\n4. When the lead signals readiness (right answers on timeline and motivation), the AI sends your booking link or proposes two specific time slots, and the appointment lands on your calendar with the qualification notes attached.\n5. The moment you type anything in the thread yourself, a kill switch tags the contact `human-active` and the AI stops responding until you turn it back on.\n\nWhy this architecture: the CRM stays the single source of truth for every message, so nothing happens in a side tool you cannot see. The AI never sends from its own number, it sends through your registered line, which keeps you compliant and keeps the thread in one place when you take over.\n\n## 5. Setup: Starter Version (under 1 hour, ~$5-35/mo)\n\nThis version uses your existing CRM's automation for the instant first text, and you drive the conversation with AI-drafted replies. It gets you 90 percent of the speed benefit with zero new infrastructure.\n\n1. Register A2P 10DLC first, because nothing else matters if your texts get filtered. In GHL: Settings > Phone Numbers > Trust Center > Start Registration. In Follow Up Boss or another CRM, look for \"texting registration\" or \"10DLC\" in phone settings. You will need: your legal business name exactly as it appears on your EIN paperwork (or register as Sole Proprietor if you have no EIN), your EIN, business address, website URL, and a sample opt-in description (\"Leads submit their phone number on my website form which states they agree to receive texts\"). Approval takes 1 to 7 days. Do this today even if you build nothing else this week.\n2. Add opt-in language to every lead form you control: \"By submitting, you agree to receive calls and texts about your inquiry. Msg/data rates may apply. Reply STOP to opt out.\" Carriers check your form during registration.\n3. Build the instant first text. In GHL: Automation > Create Workflow > trigger \"Contact Created\" (add a filter for your lead source tags if needed) > action \"Send SMS\". In Follow Up Boss: use an Action Plan triggered on new lead with an immediate text step. Paste First Touch Template A from Section 7. This alone gets you under 60 seconds, 24/7.\n4. Add a second automatic text for after-hours leads only (use your CRM's time-window condition): Template B in Section 7, which sets the expectation that you will call in the morning.\n5. Set up your booking link. GHL: Calendars > Create Calendar, connect your Google/Outlook calendar, set your availability, copy the scheduling link. Or use free Calendly. Keep this link in a saved reply.\n6. Create a project in Claude (or a custom GPT) called \"Lead Qualifier\". Paste the Qualification System Prompt from Section 7 as the project instructions. Now when a lead replies, you paste their message in, and Claude drafts your next text in your voice, one question at a time. Copy, paste, send. This sounds manual, and it is, but it takes 15 seconds per reply and every reply is on-script.\n7. Save the qualification questions as snippets/saved replies in your CRM app on your phone so you can also run the script solo without Claude.\n8. Test it: submit your own form from a family member's phone, confirm the first text arrives in under a minute, run a fake conversation, book a test appointment.\n\nYou now respond in under 60 seconds around the clock, and the only manual part is the conversation itself, which you were already doing, just slower and off-script.\n\n## 6. Setup: Full Build (automated, the pro version)\n\nPick your tier first.\n\n### Tier A: GHL Conversation AI (easiest, if you have GHL)\n\n1. Complete A2P registration (Step 1 above) and confirm your number shows Approved in Trust Center.\n2. Turn on the AI. Settings > Conversation AI (or AI Employee). Choose pay-per-message ($0.02/message) or the $97/mo unlimited AI Employee if you expect more than roughly 4,800 messages a month.\n3. Create a Conversation AI bot: give it a name (\"Alex, assistant to [Agent]\"), set channel to SMS, and set mode to Auto-Pilot (Suggestive mode drafts replies for your approval, which is a good first week setting).\n4. Paste the Qualification System Prompt from Section 7 into the bot's personality/goals field. In the bot's Goals section, add appointment booking as the objective and select your GHL calendar so it can offer real open slots.\n5. Wire the trigger: Automation > Workflow > trigger \"Contact Created\" with your lead-source filter > action \"Send SMS\" with First Touch Template A > then the Conversation AI action set to take over replies on that thread.\n6. Build the kill switch, two layers. Layer 1, automatic: in the bot's settings, switch ON the built-in pause-on-manual-reply option (in Bot Settings it is labeled along the lines of \"Stop AI when a user replies\"), so the bot goes quiet the moment you or a teammate types in the thread. Layer 2, manual override: create a workflow with trigger \"Contact Tag Added\" where the tag is `ai-off` > actions \"Remove From All Workflows\" plus the Conversation AI action that turns the bot off for that contact (if your account version lacks that action, add the contact to the bot's exclusion list instead). Save `ai-off` as a tag you can add with one tap in the GHL mobile app. Test both layers by typing in a live test thread and confirming the bot stays silent before you go live.\n7. Set office hours handoff: in the bot settings, configure it to book appointments only during your real availability and to say \"I'll have [Agent] call you first thing\" for anything it cannot answer.\n\n### Tier B: n8n + Claude API + GHL SMS (full control of the logic)\n\nThis is the build for operators who want to own the prompt, the model, and the logic. GHL still sends and receives the SMS on your registered number; n8n and Claude decide what to say.\n\n1. Prereqs: A2P-approved GHL number, n8n running on your VPS (Hostinger VPS approx. $5-10/mo, install n8n via Docker), an Anthropic API key from console.anthropic.com (add $10 credit).\n2. In GHL, create a Private Integration token: Settings > Private Integrations > New, with scopes for Contacts, Conversations, and Calendars. Save the token.\n3. In n8n, create workflow \"Speed to Lead - Inbound\". Add a Webhook node, method POST, path `s2l-inbound`, and copy its Production URL (looks like `https://your-n8n-domain/webhook/s2l-inbound`).\n4. In GHL: Automation > Workflow > trigger \"Customer Replied\" with filter channel = SMS and tag = `ai-active` > action \"Webhook\" > paste the n8n Production URL. Map/confirm the payload includes contact ID, phone, first name, and message body (GHL sends these by default). Zapier/Make equivalent: trigger \"New Inbound SMS in HighLevel\" or FUB \"Note/Text Received\", then the same steps below as Zapier actions.\n5. In n8n after the Webhook node, add an HTTP Request node to pull conversation history: GET `https://services.leadconnectorhq.com/conversations/search?contactId={{contactId}}` with your Private Integration token as a Bearer header, then a second GET for the messages in that conversation. This gives Claude the full thread, not just the last message. Make/Zapier equivalent: HighLevel \"Get Conversation\" module, or store history yourself in a Google Sheet keyed by phone number.\n6. Add the Anthropic node (or an HTTP Request to `https://api.anthropic.com/v1/messages`). Model: `claude-haiku-4-5` (cheap and fast, right for SMS). System prompt: paste the Qualification System Prompt from Section 7. Messages: the conversation history mapped as alternating user/assistant turns, newest inbound message last. Max tokens: 300.\n7. Add an IF node checking the AI output for the token `[BOOK]` (the prompt instructs Claude to emit it when the lead is ready). False branch: HTTP Request node POST `https://services.leadconnectorhq.com/conversations/messages` with type SMS, the contact ID, and Claude's reply text. True branch: same send, but the message includes your GHL calendar link, plus an HTTP request to add tag `hot-lead` and an internal notification (GHL workflow trigger on that tag texts YOU: \"Hot lead: {name}, {summary}\").\n8. Build the first-touch workflow in GHL exactly as in Tier A step 5, and add the `ai-active` tag in that same workflow so replies start routing to n8n.\n9. Build the kill switch, non-negotiable: GHL workflow, trigger \"Contact Tag Added: human-active\" > removes tag `ai-active`. Then create the trigger that adds it: in GHL, an \"Outbound Message\" by a real user is easiest to catch with the workflow trigger \"Contact Replied\" filtered to direction outbound and user is not the API user; if your GHL version lacks that filter, use the manual rule instead: you or your team adds the `human-active` tag (one tap in the mobile app) before typing. In n8n, add an IF node right after the webhook: GET the contact's tags, and if `ai-active` is missing or `human-active` is present, stop with no reply. Test this path before launch by taking over a live test thread mid-conversation.\n10. Add guardrails in n8n: a Wait/dedupe check so two rapid texts from a lead do not spawn two parallel replies (use n8n's built-in queue mode or a 20-second Wait node plus re-fetch of history), and an error branch that tags the contact `ai-error` and notifies you if the Anthropic call fails.\n11. Dry-run with the test contact, then go live on one lead source for a week before opening it to all sources.\n\n### Tier C: CRM-native AI assistants (no GHL, no n8n)\n\nIf your CRM is not GHL and you do not want to run automation yourself, buy the conversation layer as an add-on. Verify current pricing on a demo call; these move.\n\n1. Follow Up Boss: FUB's own AI features plus ISA add-ons like Structurely, which integrates directly with FUB. Structurely runs approx. $179/mo for around 50 leads up to approx. $499/mo for 225 leads. Setup: connect Structurely to FUB via the integration in Structurely's dashboard, pick which lead sources hand off to the AI, and use FUB stages to control when it engages and stops.\n2. Lofty (formerly Chime): built-in AI Assistant included with the platform (Lofty itself starts around $449/mo). Turn it on under AI Assistant settings, choose the lead types it engages, and set your calendar for booking.\n3. Ylopo RAIYA: AI text plus AI voice, approx. $295/mo as an add-on, but it requires the Ylopo platform, which typically lands at $1,000+/mo with managed ad spend. Best if you are already a Ylopo shop.\n4. In every case: complete the platform's 10DLC registration flow, upload or adapt the qualification script from Section 7 where the tool allows custom scripting, and confirm the tool's human-takeover behavior (all three pause when an agent replies, but test it yourself before trusting it).\n\n### Launch checklist (all tiers)\n\nRun every line before the system touches a real lead:\n\n- [ ] A2P status shows Approved and a test text from the number delivers to AT&T, T-Mobile, and Verizon phones (borrow phones; deliverability differs by carrier).\n- [ ] First touch arrives in under 60 seconds from a real form submission, day and night.\n- [ ] STOP reply halts everything and the contact shows as opted out in the CRM.\n- [ ] Mid-conversation human takeover silences the AI, verified live, not assumed.\n- [ ] The AI declines a commission question, a \"what are homes worth here\" question, and a \"is that a good neighborhood\" question. Ask all three yourself.\n- [ ] A booked test appointment shows on the agent's real calendar with the conversation notes attached.\n- [ ] Double-text test: send two rapid messages, confirm you get one coherent reply, not two.\n- [ ] Error path test (Tier B): break the API key on purpose, confirm you get the `ai-error` notification and the lead gets no garbage text.\n- [ ] The agent's hot-lead notification fires and includes name, source, and a summary.\n\n## 7. Prompts & Templates\n\n### First Touch Template A (instant, all hours)\n\n```\nHey {first_name}! This is Alex with {Agent Name}'s team at {Brokerage}. Thanks for reaching out about {property_or_source}. Quick question so I can point you in the right direction: are you looking to buy, sell, or both? (Text STOP to opt out)\n```\n\n### First Touch Template B (after-hours variant)\n\n```\nHey {first_name}, Alex here with {Agent Name}'s team. Got your inquiry about {property_or_source}. {Agent first name} will call you in the morning, but I can get a head start now if you want. Are you looking to buy or sell?\n```\n\n### Qualification System Prompt (paste into Conversation AI, the Anthropic node, or your Claude project)\n\n```\nYou are Alex, the assistant for {AGENT NAME}, a licensed real estate agent with {BROKERAGE} in {MARKET AREA}. You are texting with a new lead over SMS.\n\nIDENTITY AND HONESTY\n- If asked directly whether you are a bot or AI, say yes: \"I'm {AGENT NAME}'s AI assistant, I handle the first few questions so {he/she} can call you already prepared.\" Never claim to be human.\n- Never claim to be a licensed agent. You are an assistant.\n\nSTYLE\n- Texts only. 1 to 2 sentences, under 300 characters. No emojis, no exclamation point pileups, no corporate phrasing.\n- Ask exactly ONE question per message. Wait for the answer.\n- Mirror the lead's energy. Short answers get short texts.\n- Use their first name occasionally, not every message.\n\nGOAL\nQualify the lead, then book a call or appointment with {AGENT NAME}. Work through these in a natural order, skipping anything they already answered:\n1. Buying, selling, or both?\n2. What area or neighborhood? (If they came from a specific listing, ask if that home or ones like it.)\n3. Timeline: next 0-3 months, 3-6, or just browsing?\n4. Buyers: have they spoken with a lender or are they paying cash? If no lender, offer: \"{AGENT NAME} works with a couple of great local lenders, want an intro?\"\n5. Sellers: address of the home they are selling, and have they had it valued recently?\n\nBOOKING\n- Once you have (1) buy/sell, (2) area, and (3) timeline, and the timeline is under 6 months, move to booking: \"You'd be a great fit for a quick 15-minute call with {AGENT NAME}. Does tomorrow morning or afternoon work better?\"\n- When they agree to a time or ask to schedule, reply with the booking link and start your message with the exact token [BOOK] on its own, followed by: \"Here's {AGENT NAME}'s calendar, grab whatever time works: {BOOKING LINK}\"\n- If timeline is 6+ months or \"just browsing,\" do NOT push booking. Say {AGENT NAME} will send occasional area updates and they can text this number anytime.\n\nHARD RULES\n- Never discuss commission rates, never negotiate, never give a specific price opinion or home valuation. Say: \"That's exactly the kind of thing {AGENT NAME} should walk you through, want me to set up a quick call?\"\n- Never answer questions about neighborhood demographics, crime, school quality, or \"what kind of people live there.\" Say: \"For anything about the community itself, I'd point you to public sources like GreatSchools or local crime maps, but I can tell you all about the homes.\"\n- Never discuss financing terms, rates, or loan advice beyond offering a lender intro.\n- If the lead is angry, says they already have an agent, or asks to stop: apologize once, confirm no more messages, and stop. If they text STOP, that is handled automatically, do not reply.\n- If a question is outside these rules, say {AGENT NAME} will follow up personally, and notify by tagging your reply with [HUMAN] at the start.\n- Never send more than 2 unanswered follow-ups. Follow-up 1 after 1 hour, follow-up 2 the next morning, then stop.\n```\n\n### Human takeover rules (post these for your team)\n\n```\n1. The AI stops when a human types in the thread. Verify the pause on every new build before launch.\n2. Manual override: add tag \"human-active\" (or \"ai-off\" in Tier A) to silence the AI on any contact instantly. Remove \"ai-active\" only, never delete the contact history.\n3. The human MUST take over when: the lead asks a legal, commission, or valuation question; mentions another agent or a complaint; is a past client; uses distressed language (divorce, death, foreclosure); or the AI tags a message [HUMAN].\n4. Every [BOOK] and hot-lead notification gets a personal call from the agent within business hours, ideally within 30 minutes.\n5. Review every AI conversation from the past day each morning. Two minutes of scrolling. Fix the prompt when you see a bad answer; do not just wince and move on.\n```\n\n### Re-engagement nudge (send if no reply after day 3, once)\n\n```\nHey {first_name}, no rush at all. When you're ready to look at {area} homes, this number goes straight to {Agent Name}'s team. Happy to help whenever.\n```\n\n### Appointment confirmation (fires from the calendar's booking automation)\n\n```\nYou're all set, {first_name}. {Agent Name} will call you {appointment_day} at {appointment_time}. If anything comes up, reply here and we'll move it. Talk soon.\n```\n\n### Hot-lead notification to the agent (internal, fires on [BOOK] or tag \"hot-lead\")\n\n```\nHOT LEAD: {first_name} {last_name}, {phone}\nSource: {lead_source}\nWants: {buy/sell} in {area}, timeline {timeline}\nLender: {lender_status}\nBooked: {appointment_time_or_link_sent}\nThread: {conversation_link}\nCall within 30 min of the appointment reminder. Read the thread first.\n```\n\n## 8. What It Costs\n\n### Starter\n\n| Item | Startup | Monthly |\n|---|---|---|\n| A2P 10DLC (sole prop or standard brand + campaign) | $4-48 brand + approx. $15 campaign | $1.50-10 campaign fee |\n| SMS usage (200 segments/mo, carrier surcharges included) | $0 | $2-5 |\n| Claude Pro or ChatGPT (drafting replies; free tier works) | $0 | $0-20 |\n| CRM | usually already paid | $0 |\n| **Total** | **$20-65 one-time** | **$5-35** |\n\n### Full Build\n\n| Item | Startup | Monthly |\n|---|---|---|\n| A2P 10DLC | $20-65 | $1.50-10 |\n| GHL (skip if you have it; Tier C swaps this for FUB + Structurely at approx. $237-557) | $0 | $97 |\n| Tier A AI: Conversation AI pay-per-message OR AI Employee unlimited | $0 | $10-97 |\n| Tier B AI: Claude API (Haiku, 100 leads/mo, ~15 exchanges each, ~1,500 calls at ~2K tokens in / 100 out each: about $3-4; call it $5-10 with headroom) | $10 credit | $3-10 |\n| Tier B only: VPS for n8n | $0 | $5-10 |\n| SMS usage (1,500 segments/mo at ~$0.008-0.015 all-in) | $0 | $12-25 |\n| **Total (Tier B example)** | **$30-75 one-time** | **$120-160 including GHL** |\n\nAlready on GHL for your CRM? The incremental cost of Tier B is roughly $20-45 a month. Tier A pay-per-message at 100 leads/mo is similar. Compare either to $179+ for a done-for-you AI ISA or $1,500+ for a human one.\n\n## 9. Compliance & Gotchas\n\n- A2P 10DLC is not optional. Unregistered business texting gets filtered or blocked by AT&T, T-Mobile, and Verizon, and the platforms will not send without it. Budget a week for approval and register before you build.\n- TCPA consent: only text leads who gave written consent (your form's opt-in language is that consent). Never text a purchased cold list through this system. Honor STOP instantly; every platform here handles STOP automatically, do not disable it.\n- Quiet hours: TCPA safe harbor is 8am to 9pm in the lead's local time, and some states (notably Florida and Oklahoma) are stricter. Configure your automation's time window; the \"instant reply\" exception for a lead who just texted you is generally fine, but do not fire follow-up nudges at 2am.\n- Disclose the AI when asked. Several states now require bot disclosure in commercial conversations, and it is already in the prompt above. Do not remove it; getting caught pretending to be human torches trust anyway.\n- TREC advertising rules (and your state's equivalent): texts from your business line are advertising. Your first touch identifies the agent and brokerage, keep it that way. If you are on a team, follow your brokerage's team-name advertising policy in the template.\n- Fair housing: the AI must never steer. The prompt blocks demographic, school-quality, and crime commentary; leave those blocks in. Log and review any conversation where a lead pushes on those topics.\n- No license, no advice: the AI cannot give price opinions, negotiate, interpret contracts, or discuss commissions. Those are licensed activities and the prompt routes them to you. Audit for drift monthly.\n- Human review points: every booked appointment before you walk in (read the thread), every [HUMAN] tag same day, all conversations in a 2-minute morning scroll.\n- Data privacy: lead PII now lives in your CRM, your automation tool, and the AI provider. Use API keys with minimum scopes, do not paste lead lists into consumer chat tools, and check that your AI provider does not train on your API data (Anthropic does not train on API inputs by default).\n- MLS rules: if your first touch quotes listing details, you are fine on your own listings; for other brokers' listings pulled from IDX, follow your MLS display and advertising rules, and never let the AI state listing status it cannot verify.\n- The kill switch is a launch blocker. Do not go live until you have personally interrupted a live AI thread and watched it stay silent.\n"}, {"id": "b06", "file": "06-showing-debrief-loop.md", "nav": "Showing Debrief Loop", "group": "builds", "num": "06", "diff": "Easy", "lvl": 1, "starter": "$0-20", "full": "$110-160", "line": "Turns a two-minute post-showing voice note into a buyer recap email, a smarter CRM profile, and your own action items.", "md": "# Showing Debrief Loop (Voice Recorder to Follow-Up)\n\nTalk for two minutes after each showing and your buyer gets a polished recap email, your CRM gets a smarter preference profile, and you get your action items, all before you leave the driveway.\n\n## 1. What It Is\n\nAfter every showing, you record a short voice note on your phone or a wearable recorder. You just talk: which houses you saw, what the buyer loved, what they hated, what worried them, what you promised to do next. AI turns that rambling voice note into three finished products. First, a clean recap email to your buyer that lists each home with what they liked, what they didn't, and the recommended next step. Second, an updated \"buyer preference profile\" saved on their contact record, so every future home you suggest gets closer to the mark. Third, your own to-do list from the conversation.\n\nYou are not typing anything. You are not trying to remember at 9 PM what the buyer said at 2 PM. You talk, the system writes, you review and hit send.\n\n## 2. Why You Need It\n\nA showing day with 4-5 homes generates 30-45 minutes of admin if you do it right: recap email, CRM notes, follow-up tasks. Most agents skip it, which is why buyers say \"my agent never followed up\" in every post-close survey. This build turns that 30-45 minutes into a 2-minute voice note and a 90-second review. Over a 3-showing-day week, that is roughly 1.5-2 hours back, every week.\n\nThe bigger payoff is the preference profile. Buyers rarely buy the house that matches their stated criteria; they buy the one that matches what they actually reacted to in person. When \"she said the north-facing backyard was a dealbreaker\" and \"he lit up at the workshop garage\" land in the CRM the same afternoon, your next batch of suggestions is sharper than the portal alerts they get from every other agent. That is the difference between being their search engine and being their advisor, and it shows up directly in retention and referrals.\n\n## 3. What You'll Need\n\n| Tool | What it does in this build | Price | Alternatives |\n|---|---|---|---|\n| Voice recorder | Captures the debrief hands-free | Plaud NotePin $159 one-time (NotePin S $179); Plaud AI plan free tier 300 min/mo, Pro $99.99/yr | Otter.ai (free 300 min/mo, Pro $16.99/mo), iPhone Voice Memos + free built-in transcription (already have it? it works) |\n| Chat AI | Turns the transcript into email + profile + tasks | Claude Pro $20/mo | ChatGPT Plus $20/mo; free tiers work for light use |\n| CRM | Stores the preference profile, holds the buyer contact | GoHighLevel $97/mo (Starter) or $297/mo (Unlimited) | Follow Up Boss, kvCORE/BoldTrail (often brokerage-provided), Lofty, or your brokerage's free CRM. Any CRM with custom fields and notes works |\n| Automation platform (Full Build only) | Watches for new transcripts, runs the AI, files everything | n8n self-hosted on a Hostinger VPS approx. $5-10/mo | n8n Cloud approx. $24/mo, Make free tier then from approx. $10.59/mo, Zapier free tier (100 tasks/mo) then paid |\n| AI API (Full Build only) | Pay-per-use AI inside the automation | Claude API, approx. $1-3/mo at this volume | OpenAI API, similar cost |\n| Email (Full Build only) | Where the one-click draft lands | Gmail (free) or GHL's built-in email | Outlook works the same way in Zapier/Make |\n\nCheapest possible path: iPhone Voice Memos (free transcription is built into iOS), a free Claude or ChatGPT account, and your brokerage's existing CRM. Total: $0. You lose auto-sync and some polish, not the core value.\n\n## 4. How It Works\n\n1. You finish a showing, tap record, and talk through the debrief for 2-3 minutes (with the buyer in the car, or solo right after).\n2. The recorder transcribes the audio to text (Plaud, Otter, or Voice Memos all do this automatically).\n3. AI reads the transcript against a fixed debrief prompt and produces three outputs: buyer recap email, updated preference profile, agent action items.\n4. The recap email lands as a draft in your inbox or CRM, addressed to the buyer, waiting for your one-click review-and-send.\n5. The preference profile and showing notes are written to the buyer's contact record, and your action items land as tasks.\n\nWhy this architecture: the human stays exactly where judgment matters (the send button) and nowhere else. Voice is the input because it is the only capture method agents actually keep doing after week two. And the profile lives in the CRM, not in a chat history, so it compounds: showing 12 knows everything showings 1 through 11 taught it.\n\n## 5. Setup: Starter Version (under 1 hour, ~$0-20/mo)\n\nYou need: your phone, a Claude account (free works, Pro at $20/mo is better), and 20 minutes.\n\n1. Open claude.ai, sign in, and click **Projects** in the left sidebar, then **Create Project**. Name it \"Showing Debriefs.\"\n2. Click **Set project instructions** (the gear or \"instructions\" box on the project page) and paste the **Debrief Prompt** from Section 7. Save. Now every chat inside this project already knows the job; you never re-paste the prompt.\n3. Set up capture on your phone. iPhone: open **Voice Memos**, record a test, then tap the memo, tap the **transcript icon** (quote bubble, iOS 17+), tap the three-dot menu, **Copy Transcript**. Android: use the **Recorder** app (Pixel) or Otter.ai free (record in the Otter app; the transcript appears in about a minute; tap share, **Copy text**).\n4. Do a real or practice debrief. Say the addresses, the buyer's first name, and go property by property: liked, disliked, concerns, and what you agreed to do next. End with anything you promised (\"I'll ask about the roof age on Maple\").\n5. Copy the transcript, open a new chat inside your Showing Debriefs project, and paste it with one line on top: \"Buyer: Sarah Chen. Showings today. Transcript below.\" Send.\n6. Claude returns the three blocks: recap email, preference profile, action items. Read the email carefully (this is your review step), fix anything, then copy it into Gmail or your CRM's email composer and send.\n7. Copy the **Buyer Preference Profile** block into t
